<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 149 123">
  <!-- RIDD bug mark — white on the brand dark tile (from the official logo) -->
  <rect width="149" height="123" rx="16" fill="#161A1B"/>
  <g fill="#FFFFFF">
    <!-- top claws: outer bars + inward tip hooks -->
    <rect x="33" y="8" width="18" height="32"/><rect x="98" y="8" width="18" height="32"/>
    <rect x="51" y="8" width="9" height="13"/><rect x="89" y="8" width="9" height="13"/>
    <!-- elbows + inner verticals + nubs framing the head slot -->
    <rect x="33" y="40" width="36" height="17"/><rect x="80" y="40" width="36" height="17"/>
    <rect x="51" y="40" width="18" height="29"/><rect x="80" y="40" width="18" height="29"/>
    <rect x="51" y="57" width="20" height="12"/><rect x="78" y="57" width="20" height="12"/>
    <!-- side arms (stepped) + connectors -->
    <rect x="20" y="55" width="13" height="10"/><rect x="116" y="55" width="13" height="10"/>
    <rect x="10" y="65" width="23" height="23"/><rect x="116" y="65" width="23" height="23"/>
    <rect x="33" y="63" width="18" height="17"/><rect x="98" y="63" width="18" height="17"/>
    <!-- feet -->
    <rect x="19" y="90" width="18" height="26"/><rect x="112" y="90" width="18" height="26"/>
    <!-- body + separated rounded lip -->
    <rect x="45" y="72" width="59" height="30"/>
    <rect x="46" y="106" width="58" height="15" rx="7"/>
    <rect x="46" y="106" width="58" height="7"/>
  </g>
</svg>
