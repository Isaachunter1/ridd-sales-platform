<!doctype html>
<html data-theme="dark" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pay Mockup 2 — Card Sections</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root[data-theme="dark"] {
    --bg:#1D1D1D; --card:#262626; --card-2:#2a2a2a; --border:#2f2f2f; --border-2:#3a3a3a;
    --text:#F3F3F3; --text-muted:#8e8f80; --text-subtle:#6B7280;
    --accent:#8DC63F; --accent-text:#1D1D1D; --gold:#A78256;
  }
  body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif; }
  .card-x   { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .sec-hdr  { display:flex; align-items:center; justify-content: space-between; padding: 14px 18px;
              border-bottom: 1px solid var(--border); }
  .sec-lbl  { font-size: 10px; letter-spacing: .2em; font-weight: 800; color: var(--text-muted); }
  .sec-sub  { font-size: 11px; color: var(--text-subtle); font-style: italic; }
  .accent-bar { height: 3px; }
  .row      { display:flex; justify-content: space-between; align-items: center; padding: 11px 18px;
              border-top: 1px solid var(--border); font-size: 13px; }
  .row:first-child { border-top: 0; }
  .lbl      { color: var(--text); font-weight: 500; }
  .val      { font-variant-numeric: tabular-nums; font-weight: 600; }
  .val.dim  { color: var(--text-muted); font-weight: 500; }
  .pill-grp { display: inline-flex; border: 1px solid var(--border-2); border-radius: 10px; overflow: hidden; }
  .pill     { padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text); border: none; }
  .pill.on  { background: var(--accent); color: var(--accent-text); }
  select    { background: var(--card); border: 1px solid var(--border-2); border-radius: 10px; color: var(--text);
              padding: 6px 12px; font-size: 13px; }
  .hero     { background: var(--accent); color: var(--accent-text); border-radius: 14px; padding: 22px;
              display:flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .hero .num   { font-size: 44px; font-weight: 900; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .hero .meta  { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; opacity: .8; }
  .nav-back  { color: var(--text-muted); font-size: 12px; }
  .nav-back:hover { color: var(--accent); }
</style>
</head>
<body class="min-h-screen">
<script src="./_data.js"></script>

<div class="max-w-[760px] mx-auto p-6 flex flex-col gap-4">

  <div class="flex items-center justify-between text-xs">
    <a href="../index.html?demo#pay" class="nav-back">← back to app</a>
    <span class="text-[10px] uppercase tracking-widest" style="color: var(--text-subtle)">Mockup 2 · Card Sections</span>
  </div>

  <!-- Header row -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <h1 class="text-lg font-bold" id="hdr-name"></h1>
    <div class="flex items-center gap-2 flex-wrap">
      <select><option id="opt-y"></option></select>
      <select><option id="opt-p"></option></select>
      <div class="pill-grp">
        <button class="pill on" data-mode="period">Pay Period</button>
        <button class="pill"    data-mode="backend">Backend Pay Period</button>
      </div>
    </div>
  </div>

  <!-- Hero: total pay this period -->
  <div class="hero">
    <div>
      <div class="meta">Total Pay · <span id="hero-period"></span></div>
      <div class="num" id="hero-total"></div>
    </div>
    <div class="text-right">
      <div class="meta">Sales Pay</div>
      <div class="font-bold tabular-nums text-2xl" id="hero-sales"></div>
    </div>
  </div>

  <!-- Three section cards: REVENUE / BACKEND / PAY -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
    <div class="card-x">
      <div class="accent-bar" style="background:#8DC63F"></div>
      <div class="sec-hdr"><span class="sec-lbl">REVENUE</span><span class="sec-sub">this period</span></div>
      <div id="sec-revenue"></div>
    </div>
    <div class="card-x">
      <div class="accent-bar" style="background:#0EA5E9"></div>
      <div class="sec-hdr"><span class="sec-lbl">BACKEND</span><span class="sec-sub">multi-year & loyalty</span></div>
      <div id="sec-backend"></div>
    </div>
    <div class="card-x">
      <div class="accent-bar" style="background:#A78256"></div>
      <div class="sec-hdr"><span class="sec-lbl">PAY</span><span class="sec-sub">commission & bonuses</span></div>
      <div id="sec-pay"></div>
    </div>
  </div>
</div>

<script>
const m = window.MOCK;
document.getElementById('hdr-name').textContent = m.rep + ' — Pay';
document.getElementById('opt-y').textContent = m.year;
document.getElementById('opt-p').textContent = m.periodLabel + ' (Current)';
document.getElementById('hero-period').textContent = m.periodLabel + ', ' + m.year;

function rowEl(lbl, val, dim = false) {
  const r = document.createElement('div');
  r.className = 'row';
  r.innerHTML = `<span class="lbl">${lbl}</span><span class="val ${dim ? 'dim' : ''}">${window.fmt$(val)}</span>`;
  return r;
}

function render(mode) {
  const isBackend = mode === 'backend';
  const total = isBackend ? (m.salesPay + m.payPeriodBackend) : m.totalPay;
  document.getElementById('hero-total').textContent = window.fmt$(total);
  document.getElementById('hero-sales').textContent = window.fmt$(m.salesPay);

  const rev = document.getElementById('sec-revenue'); rev.innerHTML = '';
  rev.append(rowEl('Total Revenue', m.totalRevenue));
  rev.append(rowEl('Quarterly Revenue', m.quarterlyRevenue, true));

  const bk = document.getElementById('sec-backend'); bk.innerHTML = '';
  bk.append(rowEl('Multi-Year Pay', m.multiYearPay));
  bk.append(rowEl('Close Rate % Pay', m.closeRatePay));
  bk.append(rowEl('Renewal Pay', m.renewalPay, true));
  bk.append(rowEl('Pay Period Backend', m.payPeriodBackend));
  bk.append(rowEl('Quarterly Backend', m.quarterlyBackend, true));
  if (isBackend) {
    bk.append(rowEl('Pending Backend', m.pendingBackend, true));
    bk.append(rowEl('Post-Service Cancels', m.postServiceCancels, true));
  }

  const pay = document.getElementById('sec-pay'); pay.innerHTML = '';
  pay.append(rowEl('Golden Phone', m.goldenPhone, true));
  if (isBackend) {
    pay.append(rowEl('Quota Pay', m.quotaPay, true));
    pay.append(rowEl('Loyalty Pay', m.loyaltyPay, true));
  }
  pay.append(rowEl('Sales Pay', m.salesPay));
  const totRow = rowEl('Total Pay', total);
  totRow.style.background = 'var(--accent)';
  totRow.style.color = 'var(--accent-text)';
  totRow.querySelector('.lbl').style.fontWeight = '800';
  totRow.querySelector('.val').style.fontWeight = '800';
  pay.append(totRow);
}
render('period');
document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => {
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
  p.classList.add('on');
  render(p.dataset.mode);
}));
</script>
</body>
</html>
