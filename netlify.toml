[build]
  publish = "."
  # CI gate — every push runs the full check suite (function syntax, inline
  # script syntax, server/client derive parity, responsive-CSS coverage).
  # A failure FAILS THE DEPLOY and the previous version stays live, so a
  # broken commit can never reach the reps. Run locally: node tools/ci-check.js
  command = "node tools/ci-check.js && node tools/build.js"

[build.environment]
  # Netlify's deploy-artifact secret scanner matches env var VALUES
  # against built files and fails the deploy if it finds one. Two of
  # our Supabase env vars (URL + anon publishable key) are *designed*
  # to be public — they ship in window.RIDD_CONFIG and run in every
  # rep's browser, with row-level security on the database side as
  # the actual access control. Whitelist them so the scanner stops
  # flagging legitimate public values, but leave SUPABASE_SERVICE_ROLE_KEY
  # off this list so the scanner still catches it if it ever leaks into
  # a built file (it should only live in the Netlify Functions runtime).
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"

# Daily RevHawk → snapshot sync. 02:00 UTC ≈ evening across RIDD's US branches
# (~10pm Eastern / 8pm Mountain) so the full day's sales are captured. This
# scheduled function fires the background worker that pulls from BigQuery and
# writes the fresh snapshot to Supabase.
[functions."revhawk-sync-scheduled"]
  # Hourly on the hour during selling hours (12:00–03:00 UTC = 8am–11pm ET).
  # Halves the BigQuery scan volume vs half-hourly; billing is enabled now,
  # so this is cost control rather than survival. Overnight stays paused —
  # nothing sells at 4am.
  schedule = "0 * * * *"   # every hour; selling-hours window enforced in the function (ranges/lists never fired on Netlify)

[functions."marketing-refresh-scheduled"]
  schedule = "0 10 * * *"     # nightly ~5-6am ET — health-check + warm Windsor/GHL/QBO feeds

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Content-hashed app bundle: name changes when content changes, so the
# browser may cache it forever (and reuse compiled bytecode across opens).
[[headers]]
  for = "/*.immutable.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Security headers (Apple mindset: closed by default) ─────────────────
# THE single security-header block for /* — there used to be two, and
# Netlify comma-joins duplicate headers ("DENY, SAMEORIGIN"), which browsers
# handle unpredictably. SAMEORIGIN / 'self' (not DENY/'none') because the
# in-app Marketing tab iframes /marketing.html; cross-site framing is still
# blocked. HSTS pinned explicitly — one year, subdomains included.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy = "frame-ancestors 'self'; object-src 'none'; base-uri 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[redirects]]
  from = "/api/client-error"
  to = "/.netlify/functions/client-error"
  status = 200

[[redirects]]
  from = "/api/slack-paystub"
  to   = "/.netlify/functions/slack-paystub"
  status = 200

[[redirects]]
  from = "/api/admin-set-password"
  to   = "/.netlify/functions/admin-set-password"
  status = 200

[[redirects]]
  from = "/api/marketing-spend"
  to   = "/.netlify/functions/marketing-spend"
  status = 200

[[redirects]]
  from = "/api/ghl-leads"
  to   = "/.netlify/functions/ghl-leads"
  status = 200

[[redirects]]
  from = "/api/qbo-spend"
  to   = "/.netlify/functions/qbo-spend"
  status = 200

# Manual trigger for the RevHawk → snapshot sync (the daily run is scheduled in
# revhawk-sync-scheduled.js). POST here with the x-sync-secret header to refresh now.
[[redirects]]
  from = "/api/revhawk-sync"
  to   = "/.netlify/functions/revhawk-sync-background"
  status = 200

# Synchronous connection test — returns the result/error straight to the caller.
[[redirects]]
  from = "/api/revhawk-test"
  to   = "/.netlify/functions/revhawk-test"
  status = 200

# Admin "Sync now" — verifies the caller is an admin, then fires the sync.
[[redirects]]
  from = "/api/ask-data"
  to   = "/.netlify/functions/ask-data"
  status = 200

[[redirects]]
  from = "/api/sync-status"
  to   = "/.netlify/functions/sync-status"
  status = 200

[[redirects]]
  from = "/api/revhawk-sync-now"
  to   = "/.netlify/functions/revhawk-sync-now"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
