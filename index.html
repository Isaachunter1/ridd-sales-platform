// ──────────────────────────────────────────────────────────────────────────
// VIEW: PAY — replicates your PAY STUB layout
// ──────────────────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────
// PAY PERIOD HELPERS — 26 biweekly periods per year, anchored to Jan 1
// ──────────────────────────────────────────────────────────────────────────
function getPayPeriods(year) {
  const periods = [];
  const jan1 = new Date(year, 0, 1);
  for (let i = 0; i < 26; i++) {
    const start = new Date(year, 0, 1 + i * 14);
    const end   = new Date(year, 0, 1 + i * 14 + 13);
    const fmtOpt = { month: 'short', day: 'numeric' };
    periods.push({
      id: i + 1,
      start, end,
      label: `${start.toLocaleDateString('en-US', fmtOpt)} – ${end.toLocaleDateString('en-US', fmtOpt)}`,
      isoStart: start.toISOString().slice(0, 10),
      isoEnd:   end.toISOString().slice(0, 10),
    });
  }
  return periods;
}
function currentPayPeriodId(year) {
  const now = new Date();
  if (now.getFullYear() !== year) return year < now.getFullYear() ? 26 : 1;
  const periods = getPayPeriods(year);
  const p = periods.find(p => now >= p.start && now <= p.end);
  return p ? p.id : 1;
}

// ──────────────────────────────────────────────────────────────────────────
// VIEW: PAY — biweekly pay stub + commissionable accounts table
// ──────────────────────────────────────────────────────────────────────────
function viewPay() {
  const today = new Date();
  if (state.payYear == null) state.payYear = today.getFullYear();
  if (state.payPeriodId == null) state.payPeriodId = currentPayPeriodId(state.payYear);

  const years = [];
  for (let y = today.getFullYear() - 2; y <= today.getFullYear() + 1; y++) years.push(y);

  const periods = getPayPeriods(state.payYear);
  const period  = periods.find(p => p.id === state.payPeriodId) || periods[0];
  const nowPid  = currentPayPeriodId(today.getFullYear());

  const isAdmin = state.profile.role === 'admin';
  const repId   = state.profile.id;

  // Scope sales to this rep and this period (by sold_date)
  const inPeriod = (s) => {
    const d = new Date(s.sold_date + 'T00:00');
    return d >= period.start && d <= period.end && s.rep_id === repId;
  };
  const periodSales = (isAdmin ? state.allSales : state.mySales).filter(inPeriod);

  // Buckets
  const pending       = periodSales.filter(s => s.audit_status === 'pending');
  const servicedStaged= periodSales.filter(s => s.audit_status === 'serviced'       && s.staged_for_payroll);
  const belowStaged   = periodSales.filter(s => s.audit_status === 'below_minimums' && s.staged_for_payroll);
  const auditedUnstaged = periodSales.filter(s =>
    (s.audit_status === 'serviced' || s.audit_status === 'below_minimums') && !s.staged_for_payroll);

  const sumRev = (arr) => arr.reduce((a, s) => a + Number(s.revenue_amount || 0), 0);
  const pendingRev   = sumRev(pending);
  const servicedRev  = sumRev(servicedStaged);
  const belowRev     = sumRev(belowStaged);

  // Per-sale commission using the new getCommissionRate(repId, sale)
  // Serviced = full rate, Below Min = half rate (configurable in Pricing)
  const sumCommission = (arr) => arr.reduce((a, s) => a + Number(s.revenue_amount || 0) * getCommissionRate(repId, s), 0);
  const pendingPay = pending.reduce((a, s) => {
    // Estimate pending at the serviced rate (optimistic)
    const estSale = { ...s, audit_status: 'serviced' };
    return a + Number(s.revenue_amount || 0) * getCommissionRate(repId, estSale);
  }, 0);
  const salesPay   = sumCommission(servicedStaged);  // full commission
  const belowPay   = sumCommission(belowStaged);     // half commission (via getCommissionRate)

  // Close rate / multi-year backend
  const closeRateNum = (pending.length + servicedStaged.length + belowStaged.length);
  const closeRateDen = closeRateNum + periodSales.filter(s => s.audit_status === 'cancelled').length;
  const closeRate    = closeRateDen > 0 ? closeRateNum / closeRateDen : 0;
  const meetsCloseRate = closeRate >= Number(state.profile.close_rate_target);
  const closeRateBonus = meetsCloseRate ? servicedRev * 0.03 : 0;

  const multiYearBonus = servicedStaged
    .filter(s => [18, 24].includes(Number(s.contract_months)))
    .reduce((a, s) => a + Number(s.revenue_amount || 0) * 0.02, 0);

  const pendingBackend = 0;
  const totalPay = salesPay + belowPay + closeRateBonus + multiYearBonus;

  // Commissionable accounts = staged sales (serviced or below min)
  const commissionable = [...servicedStaged, ...belowStaged];

  // Stat card helper (3 cards at top). Pass an `onclick` to make a card drill-able.
  const statCard = (label, count, revenue, bg, fg, subFg, onclick) => el('div', {
    class: 'rounded-2xl p-5' + (onclick ? ' cursor-pointer transition hover:brightness-95' : ''),
    style: { background: bg, color: fg, border: `1px solid ${bg}` },
    onclick,
  },
    el('div', { class: 'flex items-center justify-between' },
      el('div', { class: 'text-[10px] uppercase tracking-widest font-semibold', style: { opacity: '.85' } }, label),
      onclick && el('span', { class: 'text-[10px] font-bold', style: { opacity: '.6' } }, '↗'),
    ),
    el('div', { class: 'text-4xl font-black mt-1 tabular-nums' }, fmt.int(count)),
    el('div', { class: 'text-xs mt-2 tabular-nums', style: { color: subFg, opacity: '.9' } }, fmt.usd(revenue) + ' revenue'),
  );

  // Pay-line row helper
  const payLine = (label, amount, opts = {}) => {
    return el('div', {
      class: 'card flex items-center justify-between px-5 py-3',
      style: opts.accent ? { borderLeft: `3px solid ${opts.accent}` } : {},
    },
      el('div', { class: 'flex items-center gap-2' },
        el('span', { class: 'font-semibold text-[14px]' }, label),
        opts.dot && el('span', { style: { color: opts.accent || 'var(--text-muted)' } }, '•'),
      ),
      el('div', { class: 'flex items-center gap-2' },
        el('span', { class: 'tabular-nums font-semibold', style: opts.textColor ? { color: opts.textColor } : {} }, amount),
        opts.suffix && el('span', { class: 'text-[10px] text-muted-' }, opts.suffix),
      ),
    );
  };

  return el('div', { class: 'flex flex-col gap-5 max-w-[1100px] mx-auto' },

    // ─── Header: name + period selector ───
    el('div', { class: 'flex items-center justify-between flex-wrap gap-3' },
      el('h1', { class: 'text-lg font-bold' }, state.profile.full_name + ' — Pay'),
      el('div', { class: 'flex items-center gap-2' },
        el('select', {
          class: 'rounded-lg border px-3 py-1.5 text-sm',
          onchange: e => {
            state.payYear = Number(e.target.value);
            state.payPeriodId = currentPayPeriodId(state.payYear);
            mountApp();
          },
        },
          ...years.map(y => el('option', { value: y, selected: y === state.payYear }, y)),
        ),
        el('select', {
          class: 'rounded-lg border px-3 py-1.5 text-sm',
          onchange: e => { state.payPeriodId = Number(e.target.value); mountApp(); },
        },
          ...periods.map(p => el('option', {
            value: p.id,
            selected: p.id === state.payPeriodId,
          }, p.label + (p.id === nowPid && state.payYear === today.getFullYear() ? ' (Current)' : ''))),
        ),
      ),
    ),

    // ─── Three stat cards ───
    el('div', { class: 'grid grid-cols-1 sm:grid-cols-3 gap-3' },
      statCard('Pending Audit',     pending.length,       pendingRev,  'var(--card)',    'var(--text)',   'var(--text-muted)',
        () => {
          // Drill into Sales tab filtered to pending-only
          state.salesFilters = { dateStart: '', dateEnd: '', status: 'pending', repId: '', contractTypeId: '' };
          state.view = 'sales';
          history.replaceState(null, '', VIEW_TO_HASH['sales'] || '#sales');
          mountApp();
        }),
      statCard('Serviced (Staged)', servicedStaged.length, servicedRev, '#8DC63F',        '#1D1D1D',       'rgba(29,29,29,.75)'),
      statCard('Below Min (Staged)',belowStaged.length,    belowRev,    '#A78256',        '#FFFFFF',       'rgba(255,255,255,.85)'),
    ),

    // ─── Pay Stub header (dark) ───
    el('div', {
      class: 'rounded-2xl p-5',
      style: { background: 'var(--header-bg)', color: 'var(--header-text)' },
    },
      el('div', { class: 'text-[10px] uppercase tracking-widest', style: { opacity: '.6' } }, 'Pay Stub'),
      el('div', { class: 'text-xl font-bold mt-1' }, state.profile.full_name),
      el('div', { class: 'text-xs mt-1', style: { opacity: '.6' } }, period.isoStart + ' – ' + period.isoEnd),
    ),

    // ─── Pay line items ───
    el('div', { class: 'flex flex-col gap-2' },
      payLine('Pending Pay', fmt.usd(pendingPay), { dot: true, accent: '#8e8f80' }),
      payLine('Below Minimums', fmt.usd(belowPay), { dot: true, accent: '#A78256', textColor: belowPay > 0 ? '#A78256' : '' }),
      payLine('Sales Pay', fmt.usd(salesPay), { dot: true, accent: '#8DC63F', textColor: salesPay > 0 ? '#5F8A1F' : '' }),
      payLine('Pending Backend', fmt.usd(pendingBackend), { textColor: '#0EA5E9', suffix: '(est.)' }),
      payLine('Multi Year % Bonus', fmt.usd(multiYearBonus), { suffix: '(est.)' }),
      payLine('Close Rate', meetsCloseRate ? 'Qualified (' + fmt.pct(closeRate) + ')' : 'None (<' + fmt.pct(state.profile.close_rate_target) + ' close rate)'),
    ),

    // ─── Total Pay banner ───
    el('div', {
      class: 'rounded-2xl px-6 py-5 flex items-center justify-between',
      style: { background: 'var(--header-bg)', color: 'var(--header-text)' },
    },
      el('div', { class: 'text-[11px] uppercase tracking-widest font-bold' }, 'Total Pay'),
      el('div', { class: 'text-3xl font-black tabular-nums', style: { color: '#8DC63F' } }, fmt.usd(totalPay)),
    ),

// Stage a single sale for payroll
async function stageSale(saleId) {
  if (DEMO) {
    for (const list of [state.mySales, state.allSales]) {
      const s = list.find(x => x.id === saleId);
      if (s) { s.staged_for_payroll = true; s.staged_at = new Date().toISOString(); }
    }
    const sale = state.allSales.find(s => s.id === saleId);
    logActivity('staged', { sale_id: saleId, customer_name: sale?.customer_name, new_status: 'staged' });
    toast('Staged for payroll', 'success');
    saveDemoData();
    mountApp();
    return;
  }
  try {
    const { error } = await supabase.from('sales').update({
      staged_for_payroll: true,
      staged_at: new Date().toISOString(),
    }).eq('id', saleId);
    if (error) throw error;
    toast('Staged for payroll', 'success');
    await loadData();
    mountApp();
  } catch (err) { toast(err.message || 'Failed', 'error'); }
}

async function stageAllForPayroll(sales) {
  if (DEMO) {
    sales.forEach(s => {
      logActivity('staged', { sale_id: s.id, customer_name: s.customer_name, new_status: 'staged' });
      s.staged_for_payroll = true; s.staged_at = new Date().toISOString();
    });
    toast(`Staged ${sales.length} sale${sales.length === 1 ? '' : 's'}`, 'success');
    saveDemoData();
    mountApp();
    return;
  }
  try {
    const ids = sales.map(s => s.id);
    const { error } = await supabase.from('sales').update({
      staged_for_payroll: true,
      staged_at: new Date().toISOString(),
    }).in('id', ids);
    if (error) throw error;
    toast(`Staged ${sales.length} sales`, 'success');
    await loadData();
    mountApp();
  } catch (err) { toast(err.message || 'Failed', 'error'); }
}

function processPayroll(sales, period) {
  if (!sales.length) return;
  if (!confirm(`Process payroll for ${sales.length} account${sales.length === 1 ? '' : 's'} in ${period.label}?`)) return;
  if (DEMO) {
    sales.forEach(s => {
      logActivity('payroll_processed', { sale_id: s.id, customer_name: s.customer_name, new_status: 'paid', detail: period.label });
      s.staged_for_payroll = false; s.payroll_processed_at = new Date().toISOString(); s.payroll_period = period.id;
    });
    toast(`Payroll processed for ${sales.length} accounts`, 'success');
    saveDemoData();
    mountApp();
    return;
  }
  // Real: set a flag. In a real deployment this would also generate a payroll record.
  (async () => {
    try {
      const ids = sales.map(s => s.id);
      const { error } = await supabase.from('sales').update({
        staged_for_payroll: false,
        payroll_processed_at: new Date().toISOString(),
        payroll_period_id: period.id,
      }).in('id', ids);
      if (error) throw error;
      toast(`Payroll processed for ${sales.length} accounts`, 'success');
      await loadData();
      mountApp();
    } catch (err) { toast(err.message || 'Failed', 'error'); }
  })();
}

function downloadPayrollCsv(sales, period) {
  if (!sales.length) return toast('Nothing to export', 'warn');
  const repId = state.profile.id;
  const headers = ['customer_name','customer_number','contract','revenue','rate','commission','backend_est','sold_date','status'];
  const lines = [headers.join(',')];
  for (const s of sales) {
    const r = Number(s.revenue_amount || 0);
    const saleRate = getCommissionRate(repId, s);
    const commission = r * saleRate;
    const backend = [18, 24].includes(Number(s.contract_months)) ? r * 0.02 : 0;
    lines.push([
      csvEsc(s.customer_name),
      csvEsc(s.customer_number || ''),
      csvEsc(contractTypeLabelForSale(s)),
      r.toFixed(2),
      (saleRate * 100).toFixed(2) + '%',
      commission.toFixed(2),
      backend.toFixed(2),
      s.sold_date,
      s.audit_status,
    ].join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = el('a', { href: url, download: `ridd-payroll-${state.profile.full_name.replace(/\s+/g, '-')}-${period.isoStart}.csv` });
  document.body.append(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// VIEW: HISTORY
// ──────────────────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────
// VIEW: CALENDAR — one bar per slot (hours of operation), many reps per bar
// ──────────────────────────────────────────────────────────────────────────
// Slots are now derived from actual shifts — admins build the schedule. Every
// shift on a given day with the same (slot_start, slot_end) renders together
// as one block. `slot_id` is the canonical "HH:MM-HH:MM" string.
// Shifts are scoped per-department (inside_sales | loyalty) via state.calendarDepartment.
const DEPARTMENTS = [
  { id: 'inside_sales', name: 'Inside Sales' },
  { id: 'loyalty',      name: 'Loyalty' },
];
function currentDepartment() { return state.calendarDepartment || 'inside_sales'; }
function shiftDept(s) { return s.department || 'inside_sales'; }
function deptShifts() {
  const d = currentDepartment();
  return state.shifts.filter(s => shiftDept(s) === d);
}
function slotIdFor(slotStart, slotEnd) { return slotStart + '-' + slotEnd; }
function shiftSlotsForDate(iso) {
  const groups = {};
  deptShifts().filter(s => s.date === iso).forEach(s => {
    const key = slotIdFor(s.slot_start, s.slot_end);
    if (!groups[key]) {
      groups[key] = {
        slot_id: key,
        slot_start: s.slot_start,
        slot_end: s.slot_end,
        label: `${fmtTime(s.slot_start)} – ${fmtTime(s.slot_end)}`,
      };
    }
  });
  return Object.values(groups).sort((a, b) => a.slot_start.localeCompare(b.slot_start));
}
function slotTemplate(iso, slotId) {
  const existing = shiftSlotsForDate(iso).find(s => s.slot_id === slotId);
  if (existing) return existing;
  // Synthesize from the slotId (covers the case where the last rep was just removed)
  const [start, end] = (slotId || '').split('-');
  if (!start || !end) return null;
  return { slot_id: slotId, slot_start: start, slot_end: end, label: `${fmtTime(start)} – ${fmtTime(end)}` };
}
function assignmentsForSlot(iso, slotId) {
  return deptShifts()
    .filter(s => s.date === iso && s.slot_id === slotId)
    .sort((a, b) => a.start.localeCompare(b.start));
}

// Date helpers
function isoDate(d) { return d.toISOString().slice(0, 10); }
function startOfWeek(d) { const x = new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate() - x.getDay()); return x; }
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function shiftAnchor(anchor, view, dir) {
  const x = new Date(anchor);
  if (view === 'week') x.setDate(x.getDate() + 7 * dir);
  else x.setMonth(x.getMonth() + dir);
  return view === 'week' ? startOfWeek(x) : startOfMonth(x);
}
function calendarWindowLabel(anchor, view) {
  if (view === 'week') {
    const end = new Date(anchor); end.setDate(anchor.getDate() + 6);
    const fmtShort = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `${fmtShort(anchor)} – ${fmtShort(end)}, ${end.getFullYear()}`;
  }
  return anchor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function legendDot(color, label) {
  return el('div', { class: 'flex items-center gap-1.5' },
    el('span', { class: 'inline-block rounded-full', style: { width: '8px', height: '8px', background: color } }),
    el('span', {}, label),
  );
}
function fmtTime(hhmm) {
  if (!hhmm) return '';
  const [h, m] = hhmm.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = ((h + 11) % 12) + 1;
  return m ? `${h12}:${String(m).padStart(2,'0')} ${ampm}` : `${h12} ${ampm}`;
}
function repInitials(rep) {
  return (rep?.full_name || '').split(/\s+/).filter(Boolean).map(p => p[0]).join('').slice(0, 2).toUpperCase() || '?';
}

function renderSlotBar(iso, slot, meId, repById, opts = {}) {

      el('span', { class: 'text-[10px] font-bold uppercase tracking-wider', style: { color: 'var(--text-muted)' } },
        opts.compactLabel ? `${fmtTime(slot.slot_start)}–${fmtTime(slot.slot_end)}` : slot.label),
      assigns.length > 0 && el('span', { class: 'text-[10px] font-bold', style: { color: 'var(--text-muted)' } }, `${assigns.length}`),
    ),
    assigns.length === 0
      ? el('div', { class: 'text-[11px] italic', style: { color: 'var(--text-subtle)' } }, 'No reps · click to add')
      : el('div', { class: 'flex flex-wrap gap-1' },
          ...assigns.map(a => {
            const rep = repById[a.rep_id];
            const isPartial = a.start !== slot.slot_start || a.end !== slot.slot_end;
            const isMine = a.rep_id === meId;
            const firstName = rep?.full_name?.split(' ')[0] || 'Rep';

            }, firstName + (isPartial ? ` · ${fmtTime(a.start)}–${fmtTime(a.end)}` : ''));

}

// ── Week view: Google Calendar–style time grid ────────────────────────────
const WEEK_START_HOUR  = 6;   // 6 AM
const WEEK_END_HOUR    = 19;  // 7 PM (exclusive)
const WEEK_HOUR_HEIGHT = 56;  // px per hour
function _toMin(hhmm) { const [h,m] = hhmm.split(':').map(Number); return h*60 + m; }
function _timeToPx(hhmm) {
  return ((_toMin(hhmm) - WEEK_START_HOUR * 60) / 60) * WEEK_HOUR_HEIGHT;
}
// Group overlapping slots so they render side-by-side within a day column.
function layoutSlots(slots) {
  const items = slots.map(s => ({ ...s, _a: _toMin(s.slot_start), _b: _toMin(s.slot_end) }))
                     .sort((a,b) => a._a - b._a);
  const clusters = [];
  items.forEach(it => {
    const cluster = clusters.find(c => c.some(ci => ci._b > it._a && ci._a < it._b));
    if (cluster) cluster.push(it); else clusters.push([it]);
  });
  const laid = [];
  clusters.forEach(c => c.forEach((it, idx) => laid.push({ slot: it, colIdx: idx, cols: c.length })));
  return laid;
}

function renderWeekGrid(anchor, today, meId, repById) {
  const isAdmin = state.profile.role === 'admin';
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const days = Array.from({ length: 7 }, (_, i) => { const d = new Date(anchor); d.setDate(anchor.getDate() + i); return d; });
  const todayIso = isoDate(today);
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const nowPx = ((nowMin - WEEK_START_HOUR * 60) / 60) * WEEK_HOUR_HEIGHT;
  const showNow = nowMin >= WEEK_START_HOUR * 60 && nowMin <= WEEK_END_HOUR * 60;
  const gridHeight = (WEEK_END_HOUR - WEEK_START_HOUR) * WEEK_HOUR_HEIGHT;

  // ── Header row: empty gutter cell + 7 day cells ──
  const header = el('div', {
    class: 'border-b text-xs font-semibold uppercase tracking-wider flex',
    style: { borderColor: 'var(--border)' },
  },
    el('div', { class: 'flex-shrink-0', style: { width: '56px' } }),
    ...days.map(d => {
      const iso = isoDate(d);
      return el('div', {
        class: 'flex-1 p-3 text-center',
        style: { background: iso === todayIso ? 'rgba(141,198,63,0.08)' : 'transparent',
                 color: iso === todayIso ? 'var(--accent)' : 'var(--text-muted)' },
      },
        el('div', {}, dayNames[d.getDay()]),
        el('div', {
          class: iso === todayIso
            ? 'inline-flex items-center justify-center rounded-full text-base font-bold mt-0.5'
            : 'text-base font-bold mt-0.5',
          style: iso === todayIso
            ? { width: '28px', height: '28px', background: 'var(--accent)', color: 'var(--accent-text)' }
            : { color: 'var(--text)' },
        }, String(d.getDate())),
      );
    }),
  );

  // ── Time gutter (hour labels) ──
  const gutter = el('div', {
    class: 'flex-shrink-0 relative',
    style: { width: '56px', height: gridHeight + 'px' },
  });
  for (let h = WEEK_START_HOUR; h < WEEK_END_HOUR; h += 1) {
    const isNoon = h === 12;
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12  = ((h + 11) % 12) + 1;
    gutter.append(el('div', {
      class: 'absolute pr-2 text-right text-[10px] font-semibold',
      style: {
        top: ((h - WEEK_START_HOUR) * WEEK_HOUR_HEIGHT - 6) + 'px',
        right: '0', width: '56px',
        color: 'var(--text-muted)',
      },
    }, h === WEEK_START_HOUR ? '' : (isNoon ? 'Noon' : `${h12} ${ampm}`)));
  }

  // ── Day columns ──
  const dayColumns = days.map((d, dayIdx) => {
    const iso = isoDate(d);
    const slots = shiftSlotsForDate(iso);
    const laid = layoutSlots(slots);
    const col = el('div', {
      class: 'flex-1 relative' + (isAdmin ? ' cursor-pointer' : ''),
      style: {
        height: gridHeight + 'px',
        borderLeft: '1px solid var(--border)',
        background: iso === todayIso ? 'rgba(141,198,63,0.04)' : 'transparent',
      },
      onclick: isAdmin ? (e) => {
        // Ignore clicks on existing shift blocks — those handle their own click
        if (e.target.closest('button')) return;
        // Derive a sensible default start time from click Y position (nearest hour)
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const hour = Math.max(WEEK_START_HOUR, Math.min(WEEK_END_HOUR - 1,
          Math.round(WEEK_START_HOUR + y / WEEK_HOUR_HEIGHT)));
        const defaultStart = String(hour).padStart(2, '0') + ':00';
        const defaultEnd   = String(Math.min(WEEK_END_HOUR, hour + 8)).padStart(2, '0') + ':00';
        openNewShiftModal(iso, { start: defaultStart, end: defaultEnd });
      } : null,
    });
    // Horizontal hour lines
    for (let h = WEEK_START_HOUR; h <= WEEK_END_HOUR; h += 1) {
      col.append(el('div', {
        class: 'absolute left-0 right-0',
        style: {
          top: ((h - WEEK_START_HOUR) * WEEK_HOUR_HEIGHT) + 'px',
          height: '1px', background: 'var(--border)', opacity: '0.5',
          pointerEvents: 'none',
        },
      }));
    }
    // Admin-only hint for empty day columns
    if (isAdmin && laid.length === 0) {
      col.append(el('div', {
        class: 'absolute inset-0 flex items-center justify-center text-center text-[11px] italic pointer-events-none',
        style: { color: 'var(--text-subtle)', padding: '12px' },
      }, 'Click anywhere to add a shift'));
    }
    // Slot blocks
    laid.forEach(({ slot, colIdx, cols }) => {
      const top = _timeToPx(slot.slot_start);
      const bot = _timeToPx(slot.slot_end);
      const leftPct  = (colIdx / cols) * 100;
      const widthPct = (1 / cols) * 100;
      const assigns = assignmentsForSlot(iso, slot.slot_id);
      const includesMe = assigns.some(a => a.rep_id === meId);
      const block = el('button', {
        class: 'absolute rounded-lg border text-left transition hover:brightness-95 overflow-hidden flex flex-col gap-1',
        style: {
          top: (top + 2) + 'px',
          height: (bot - top - 4) + 'px',
          left: `calc(${leftPct}% + 2px)`,
          width: `calc(${widthPct}% - 4px)`,
          padding: '6px 8px',
          borderColor: includesMe ? 'var(--accent)' : 'var(--border-2)',
          background: includesMe ? 'rgba(141,198,63,0.14)' : 'var(--card-2)',
          color: 'var(--text)',
        },
        onclick: () => openSlotModal(iso, slot.slot_id),
      },
        el('div', { class: 'text-[10px] font-bold uppercase tracking-wider whitespace-nowrap', style: { color: 'var(--text-muted)' } },
          `${fmtTime(slot.slot_start)}–${fmtTime(slot.slot_end)}`),
        el('div', { class: 'text-[11px] font-semibold leading-tight' },
          assigns.length === 0
            ? el('span', { class: 'italic', style: { color: 'var(--text-subtle)' } }, 'No reps')
            : el('span', {}, assigns.slice(0, 6).map(a => {
                const rep = repById[a.rep_id];
                const isPartial = a.start !== slot.slot_start || a.end !== slot.slot_end;
                const firstName = rep?.full_name?.split(' ')[0] || 'Rep';
                return firstName + (isPartial ? '*' : '');
              }).join(', ') + (assigns.length > 6 ? ` +${assigns.length - 6}` : '')),
        ),
        assigns.length > 0 && el('div', { class: 'text-[10px] mt-auto', style: { color: 'var(--text-muted)' } },
          `${assigns.length} rep${assigns.length === 1 ? '' : 's'}`),
      );
      col.append(block);
    });
    // Current-time indicator for today
    if (iso === todayIso && showNow) {
      col.append(el('div', {
        class: 'absolute left-0 right-0',
        style: { top: (nowPx - 1) + 'px', height: '2px', background: '#EF4444', pointerEvents: 'none', zIndex: '5' },
      }));
      col.append(el('div', {
        class: 'absolute rounded-full',
        style: { top: (nowPx - 5) + 'px', left: '-5px', width: '10px', height: '10px', background: '#EF4444', pointerEvents: 'none', zIndex: '5' },
      }));
    }
    return col;
  });

  return el('div', { class: 'card overflow-hidden' },
    header,
    el('div', {
      class: 'relative',
      style: { maxHeight: '70vh', overflowY: 'auto' },
    },
      el('div', { class: 'flex', style: { minHeight: gridHeight + 'px' } },
        gutter,
        ...dayColumns,
      ),
    ),
    // Footer legend for partials
    el('div', { class: 'px-4 py-2 text-[10px] border-t', style: { borderColor: 'var(--border)', color: 'var(--text-muted)' } },
      'Click a block to manage reps. Names marked with * are covering only part of the shift.'),
  );
}

function renderMonthGrid(anchor, today, meId, repById) {
  const isAdmin = state.profile.role === 'admin';
  const first = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
  const lastDay = new Date(anchor.getFullYear(), anchor.getMonth() + 1, 0).getDate();
  const startPad = first.getDay();
  const cells = [];
  for (let i = 0; i < startPad; i += 1) cells.push(null);
  for (let dd = 1; dd <= lastDay; dd += 1) cells.push(new Date(anchor.getFullYear(), anchor.getMonth(), dd));
  while (cells.length % 7 !== 0) cells.push(null);
  const todayIso = isoDate(today);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return el('div', { class: 'card overflow-hidden' },
    el('div', { class: 'grid grid-cols-7 border-b text-[11px] font-semibold uppercase tracking-wider text-muted-', style: { borderColor: 'var(--border)' } },
      ...dayNames.map(n => el('div', { class: 'p-2.5 text-center' }, n)),
    ),
    el('div', { class: 'grid grid-cols-7' },
      ...cells.map((d, idx) => {
        if (!d) {
          return el('div', { class: 'border-r border-b', style: {
            borderColor: 'var(--border)',
            borderRightWidth: (idx + 1) % 7 === 0 ? '0' : '1px',
            minHeight: '120px',
            opacity: '0.35',
          } });
        }
        const iso = isoDate(d);
        const isToday = iso === todayIso;
        const slots = shiftSlotsForDate(iso);
        const cell = el('div', {
          class: 'p-1.5 border-r border-b flex flex-col gap-1 relative' + (isAdmin ? ' cursor-pointer' : ''),
          style: {
            borderColor: 'var(--border)',
            borderRightWidth: (idx + 1) % 7 === 0 ? '0' : '1px',
            minHeight: '120px',
            background: isToday ? 'rgba(141,198,63,0.06)' : 'transparent',
          },
          onclick: isAdmin ? () => openNewShiftModal(iso) : null,
        },
          el('div', { class: 'flex items-center justify-between mb-0.5 pointer-events-none' },
            el('div', { class: 'text-xs font-bold', style: { color: isToday ? 'var(--accent)' : 'var(--text)' } }, String(d.getDate())),
            isAdmin && el('span', {
              class: 'inline-flex items-center justify-center rounded-full text-[12px] font-bold leading-none',
              style: {
                width: '18px', height: '18px',
                background: 'var(--accent)', color: 'var(--accent-text)',
                flexShrink: '0',
              },
              title: 'Add shift',
            }, '+'),
          ),
          ...slots.map(s => renderSlotBar(iso, s, meId, repById, { compactLabel: true })),
        );
        return cell;
      }),
    ),
  );
}

// ── Swap request card (top-of-page Inbox / Outgoing lists) ────────────────
function swapRequestCard(req, repById, direction) {
  const shift = state.shifts.find(s => s.id === req.shift_id);
  const from  = repById[req.from_rep_id];
  const to    = repById[req.to_rep_id];
  if (!shift) return null;
  const dateLabel = new Date(shift.date + 'T00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  return el('div', { class: 'flex items-center justify-between gap-3 rounded-lg px-3 py-2.5 border', style: { borderColor: 'var(--border)', background: 'var(--card-2)' } },
    el('div', { class: 'flex-1 min-w-0' },
      el('div', { class: 'text-sm font-semibold' },
        direction === 'incoming' ? `${from?.full_name || 'A rep'} → you` : `You → ${to?.full_name || 'rep'}`),
      el('div', { class: 'text-xs text-muted- mt-0.5' },
        `${dateLabel} · ${fmtTime(shift.start)}–${fmtTime(shift.end)}`),
      req.note && el('div', { class: 'text-xs mt-1 italic', style: { color: 'var(--text-muted)' } }, '"' + req.note + '"'),
    ),
    direction === 'incoming' && el('div', { class: 'flex gap-1.5' },
      el('button', {
        class: 'rounded-lg px-3 py-1.5 text-xs font-bold',
        style: { background: 'var(--accent)', color: 'var(--accent-text)' },
        onclick: () => resolveSwap(req.id, 'accepted'),
      }, 'Accept'),
      el('button', {
        class: 'rounded-lg px-3 py-1.5 text-xs font-semibold border',
        style: { borderColor: 'var(--border-2)', color: 'var(--text)' },
        onclick: () => resolveSwap(req.id, 'declined'),
      }, 'Decline'),
    ),
    direction === 'outgoing' && el('div', { class: 'flex gap-1.5' },
      el('span', { class: 'text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded',
        style: { background: 'var(--card)', color: 'var(--text-muted)' } }, 'Pending'),
      el('button', {
        class: 'rounded-lg px-3 py-1.5 text-xs font-semibold border',
        style: { borderColor: 'var(--border-2)', color: 'var(--text)' },
        onclick: () => resolveSwap(req.id, 'cancelled'),
      }, 'Cancel'),
    ),
  );
}

function resolveSwap(requestId, decision) {
  const req = state.shiftSwapRequests.find(r => r.id === requestId);
  if (!req) return;
  if (decision === 'accepted') {
    const shift = state.shifts.find(s => s.id === req.shift_id);
    if (shift) shift.rep_id = req.to_rep_id;
    req.status = 'accepted';
  } else if (decision === 'declined') {
    req.status = 'declined';
  } else if (decision === 'cancelled') {
    req.status = 'cancelled';
  }
  req.resolved_at = new Date().toISOString();
  saveDemoData();
  toast(decision === 'accepted' ? 'Shift transferred' : decision === 'declined' ? 'Request declined' : 'Request cancelled',
        decision === 'accepted' ? 'success' : 'info');
  mountApp();
}

// ── Create-shift modal: pick days, times, reps, then fan out assignments ──
function openNewShiftModal(defaultIso, opts = {}) {
  if (state.profile.role !== 'admin') return;
  const allReps = state.allProfiles.length ? state.allProfiles : [state.profile];
  const reps = allReps.filter(r => r.is_active !== false); // hide inactive from assignable list
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  // ── Form state ──
  const RECURRENCE_WEEKS = 52; // 1-year horizon; effectively "forever" — admin adjusts individual days as needed
  const formState = {
    mode:       'single',                                                                  // 'single' | 'range'
    start_date: defaultIso || isoDate(new Date()),
    start:      opts.start || '09:00',
    end:        opts.end   || '17:00',
    rep_ids:    new Set(),
    // For Date-range mode: which weekdays repeat. Pre-seeded from the clicked day.
    days:       new Set([new Date((defaultIso || isoDate(new Date())) + 'T00:00').getDay()]),
  };

  const card = el('div', { class: 'card w-full max-w-lg my-8 overflow-hidden flex flex-col', style: { maxHeight: 'calc(100vh - 64px)' } });

  const header = el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
    el('div', {},
      el('h2', { class: 'text-base font-bold' }, 'New shift'),
      el('div', { class: 'text-xs text-muted- mt-0.5' }, 'Adjust individual days directly from the calendar.'),
    ),
    el('button', {
      class: 'rounded-lg border px-3 py-1.5 text-xs text-muted-',
      style: { borderColor: 'var(--border-2)' },
      onclick: () => overlay.remove(),
    }, 'Cancel'),
  );

  const body = el('div', { class: 'flex-1 overflow-y-auto px-5 py-4 flex flex-col gap-5' });

  // ── Mode toggle: Single Shift | Date Range ──
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const modeToggle = el('div', {
    class: 'inline-flex rounded-xl border overflow-hidden self-start',
    style: { borderColor: 'var(--border-2)' },
  });
  const dateLabel = el('span', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, 'Date');
  const dayRow = el('div', { class: 'flex flex-wrap gap-1.5' });
  const daysSection = el('div', { class: 'flex flex-col gap-1.5', style: { display: 'none' } });
  function renderDayChips() {
    dayRow.innerHTML = '';
    dayNames.forEach((n, i) => {
      const on = formState.days.has(i);
      dayRow.append(el('button', {
        type: 'button',
        class: 'rounded-full px-3 py-1.5 text-xs font-semibold border transition',
        style: on
          ? { background: 'var(--accent)', color: 'var(--accent-text)', borderColor: 'var(--accent)' }
          : { background: 'transparent', color: 'var(--text)', borderColor: 'var(--border-2)' },
        onclick: () => {
          if (formState.days.has(i)) formState.days.delete(i);
          else formState.days.add(i);
          renderDayChips();
        },
      }, n));
    });
  }
  renderDayChips();
  daysSection.append(
    el('span', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, 'Days of week'),
    dayRow,
    el('div', { class: 'text-[10px] text-muted-' },
      'Repeats on these days going forward. If a shift needs to change later, just edit that day.'),
  );
  function renderModeToggle() {
    modeToggle.innerHTML = '';
    ['single', 'range'].forEach(m => {
      modeToggle.append(el('button', {
        type: 'button',
        class: 'px-4 py-2 text-xs font-semibold transition',
        style: formState.mode === m
          ? { background: 'var(--accent)', color: 'var(--accent-text)' }
          : { background: 'transparent', color: 'var(--text)' },
        onclick: () => {
          formState.mode = m;
          dateLabel.textContent = m === 'range' ? 'Starting' : 'Date';
          daysSection.style.display = m === 'range' ? 'flex' : 'none';
          renderModeToggle();
        },
      }, m === 'single' ? 'Single shift' : 'Date range'));
    });
  }
  renderModeToggle();
  body.append(el('div', { class: 'flex flex-col gap-1.5' },
    el('span', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, 'Mode'),
    modeToggle,
    el('div', { class: 'text-[10px] text-muted-' },
      'Single shift adds just that one day. Date range repeats on the weekdays you pick.'),
  ));

  // ── Date (Single or "Starting" in Range mode) ──
  const startDateInput = el('input', {
    type: 'date', class: 'rounded-lg border px-3 py-2 text-sm',
    value: formState.start_date, style: { borderColor: 'var(--border-2)' },
    onchange: (e) => {
      formState.start_date = e.target.value;
      // Move the auto-selected weekday chip to the new date if only one was selected
      if (formState.days.size === 1) {
        formState.days.clear();
        formState.days.add(new Date(e.target.value + 'T00:00').getDay());
        renderDayChips();
      }
    },
  });
  body.append(el('label', { class: 'flex flex-col gap-1.5' },
    dateLabel,
    startDateInput,

  // ── Days of week (only shown in Range mode) ──

  const endInput   = el('input', { type: 'time', class: 'w-full rounded-lg border px-3 py-2 text-sm', value: formState.end,   style: { borderColor: 'var(--border-2)' }, onchange: e => formState.end = e.target.value });
  body.append(el('div', { class: 'flex flex-col gap-1.5' },
    el('span', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, 'Shift time'),
    el('div', { class: 'flex items-center gap-2' },

      el('label', { class: 'text-[10px] font-semibold flex-1 text-muted-' }, 'End',   endInput),

  ));

  // ── Reps (multi-select, clickable rows) ──
  const repRow = el('div', { class: 'flex flex-col gap-1 max-h-48 overflow-y-auto rounded-lg border p-1.5', style: { borderColor: 'var(--border-2)' } });
  const repCountLabel = el('span', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, 'Reps working this shift');
  const refreshCountLabel = () => {
    repCountLabel.textContent = formState.rep_ids.size
      ? `Reps working this shift (${formState.rep_ids.size} selected)`
      : 'Reps working this shift';
  };
  reps.forEach(r => {
    const applyStyles = (selected) => {
      row.style.background    = selected ? 'var(--accent)' : 'transparent';
      row.style.color         = selected ? 'var(--accent-text)' : 'var(--text)';
      row.style.fontWeight    = selected ? '700' : '500';
      check.style.visibility  = selected ? 'visible' : 'hidden';
    };
    const check = el('span', {
      class: 'mr-2 text-sm font-bold flex-shrink-0',
      style: { visibility: 'hidden' },
    }, '✓');
    const row = el('button', {
      type: 'button',
      class: 'w-full flex items-center text-left text-sm py-2 px-3 rounded-md transition hover:brightness-95',
      onclick: () => {
        const next = !formState.rep_ids.has(r.id);
        if (next) formState.rep_ids.add(r.id);
        else      formState.rep_ids.delete(r.id);
        applyStyles(next);
        refreshCountLabel();
      },
    }, check, r.full_name);
    applyStyles(false);
    repRow.append(row);
  });
  body.append(el('div', { class: 'flex flex-col gap-1.5' },
    repCountLabel,
    repRow,
    el('div', { class: 'text-[10px] text-muted-' }, 'Tap a name to toggle. You can add more reps or narrow times per-rep later by clicking the shift block.'),
  ));

  // ── Footer: Create ──
  const footer = el('div', { class: 'px-5 py-4 border-t flex items-center justify-end gap-2', style: { borderColor: 'var(--border)' } },
    el('button', {
      class: 'rounded-lg px-4 py-2.5 text-sm font-bold transition hover:brightness-95',
      style: { background: 'var(--accent)', color: 'var(--accent-text)' },
      onclick: () => {
        if (formState.start >= formState.end) { toast('End time must be after start time', 'warn'); return; }
        if (formState.rep_ids.size === 0)     { toast('Pick at least one rep', 'warn'); return; }
        if (formState.mode === 'range' && formState.days.size === 0) {
          toast('Pick at least one day of the week', 'warn'); return;
        }
        const slotId = slotIdFor(formState.start, formState.end);
        const picks = Array.from(formState.rep_ids);
        // Build the list of dates to apply this shift to
        const dates = [];
        if (formState.mode === 'single') {
          dates.push(formState.start_date);
        } else {
          // Repeat indefinitely (1-year horizon) on the selected weekdays
          const start = new Date(formState.start_date + 'T00:00');
          const until = new Date(start); until.setDate(start.getDate() + 7 * RECURRENCE_WEEKS);
          for (let d = new Date(start); d <= until; d.setDate(d.getDate() + 1)) {
            if (formState.days.has(d.getDay())) dates.push(isoDate(d));
          }
        }
        const dept = currentDepartment();
        let added = 0;
        dates.forEach(dIso => {
          picks.forEach(repId => {
            // Dedupe per-department: a rep can be on the same slot+date in both
            // departments (e.g. cross-trained), just not twice in the same one.
            if (state.shifts.some(s => s.date === dIso && s.slot_id === slotId && s.rep_id === repId && shiftDept(s) === dept)) return;
            state.shifts.push({
              id: `shift-${dIso}-${slotId}-${repId}-${Date.now()}-${added}`,
              date: dIso,
              slot_id: slotId,
              slot_start: formState.start,
              slot_end:   formState.end,
              rep_id: repId,
              start: formState.start,
              end:   formState.end,
              note: '',
              recurring: false,
              department: dept,
            });
            added += 1;
          });
        });
        saveDemoData();
        overlay.remove();
        toast(
          formState.mode === 'single'
            ? `Created ${added} shift${added === 1 ? '' : 's'}`
            : `Created ${added} shift${added === 1 ? '' : 's'} across ${formState.days.size} weekday${formState.days.size === 1 ? '' : 's'}`,
          'success');
        mountApp();
      },
    }, 'Create shift'),
  );

  card.append(header, body, footer);
  overlay.append(card);
  document.body.append(overlay);
}

// ── Recurrence helpers ────────────────────────────────────────────────────
// An assignment is "recurring" when `recurring !== false`. The series is
// grouped by (rep_id, slot_id, day-of-week). "All upcoming" operations match
// the current shift + every future recurring sibling on the same weekday.
function weekdayName(iso) {
  return new Date(iso + 'T00:00').toLocaleDateString('en-US', { weekday: 'long' });
}
function isRecurring(a) { return a && a.recurring !== false; }
function findRecurringSiblings(assignment, scope) {
  if (scope === 'this') {
    const hit = state.shifts.find(s => s.id === assignment.id);
    return hit ? [hit] : [];
  }
  const dow = new Date(assignment.date + 'T00:00').getDay();
  const dept = shiftDept(assignment);
  return state.shifts.filter(s =>
    isRecurring(s)
    && shiftDept(s) === dept
    && s.slot_id === assignment.slot_id
    && s.rep_id === assignment.rep_id
    && s.date    >= assignment.date
    && new Date(s.date + 'T00:00').getDay() === dow
  );
}

// Show a "Only this shift / All upcoming <Weekday>s" prompt for recurring
// assignments. If not recurring, applies immediately.
function applyRecurringChange(assignment, label, applyFn, redraw) {
  const commit = (scope, toastMsg) => {
    applyFn(scope);
    saveDemoData();
    if (toastMsg) toast(toastMsg, 'success');
    redraw();
  };
  if (!isRecurring(assignment)) {
    commit('this', `${label}d`);
    return;
  }
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const dateLabel = new Date(assignment.date + 'T00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  const weekday = weekdayName(assignment.date);
  const card = el('div', { class: 'card w-full max-w-sm my-8 overflow-hidden' },
    el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
      el('h2', { class: 'text-base font-bold' }, `${label} recurring shift?`),
      el('button', { class: 'rounded-lg border px-3 py-1.5 text-xs', style: { borderColor: 'var(--border-2)' }, onclick: () => overlay.remove() }, 'Cancel'),
    ),
    el('div', { class: 'px-5 py-4 flex flex-col gap-3' },
      el('p', { class: 'text-sm' },
        `This shift repeats every ${weekday}. Are you sure you want to adjust it?`),
      el('div', { class: 'flex flex-col gap-2' },
        el('button', {
          class: 'rounded-lg px-4 py-2.5 text-sm font-bold text-left',
          style: { background: 'var(--accent)', color: 'var(--accent-text)' },
          onclick: () => { overlay.remove(); commit('this', `Only ${dateLabel} updated`); },
        }, `Only this shift · ${dateLabel}`),
        el('button', {
          class: 'rounded-lg px-4 py-2.5 text-sm font-semibold border text-left',
          style: { borderColor: 'var(--border-2)', color: 'var(--text)' },
          onclick: () => { overlay.remove(); commit('all', `All upcoming ${weekday}s updated`); },
        }, `All upcoming ${weekday}s`),
      ),
    ),
  );
  overlay.append(card);
  document.body.append(overlay);
}

// ── Slot modal: one slot/date. Add/remove reps, split, transfer ───────────
function openSlotModal(iso, slotId) {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const render = () => {
    const slot = slotTemplate(iso, slotId);
    if (!slot) { overlay.remove(); return; }
    // Full roster (used for looking up names on already-assigned reps, even if deactivated later).
    // Active roster is used for things the admin can still *assign to* now.
    const allReps    = state.allProfiles.length ? state.allProfiles : [state.profile];
    const activeReps = allReps.filter(r => r.is_active !== false);
    const meId = state.profile.id;
    const isAdmin = state.profile.role === 'admin';
    const repById = Object.fromEntries(allReps.map(r => [r.id, r]));
    const assigns = assignmentsForSlot(iso, slotId);
    const dateLabel = new Date(iso + 'T00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    const card = el('div', { class: 'card w-full max-w-md my-8 overflow-hidden flex flex-col', style: { maxHeight: 'calc(100vh - 64px)' } });

    const header = el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
      el('div', {},
        el('h2', { class: 'text-base font-bold' }, slot.label),
        el('div', { class: 'text-xs text-muted- mt-0.5' },
          dateLabel + (isAdmin ? ' · Admin edit' : '')),
      ),
      el('button', {
        class: 'rounded-lg border px-3 py-1.5 text-xs text-muted-',
        style: { borderColor: 'var(--border-2)' },
        onclick: () => overlay.remove(),
      }, 'Close'),
    );

    const body = el('div', { class: 'flex-1 overflow-y-auto' });

    const assignedList = el('div', { class: 'px-5 py-4 flex flex-col gap-2 border-b', style: { borderColor: 'var(--border)' } },
      el('div', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, `Reps working this shift (${assigns.length})`),
      ...(assigns.length === 0
        ? [el('div', { class: 'text-sm text-muted- italic py-2' },
            isAdmin ? 'Nobody assigned yet — add a rep below.' : 'Nobody assigned yet.')]
        : assigns.map(a => assignmentRow(a, slot, activeReps, repById, meId, isAdmin, redraw))
      ),
    );

    body.append(assignedList);

    // ── Admin-only: add a rep to this slot ──
    if (isAdmin) {
      const unassignedReps = activeReps.filter(r => !assigns.some(a => a.rep_id === r.id));
      const addSelect = el('select', {
        class: 'flex-1 rounded-lg border px-3 py-2 text-sm',
        style: { borderColor: 'var(--border-2)' },
      },
        el('option', { value: '' }, 'Choose rep…'),
        ...unassignedReps.map(r => el('option', { value: r.id }, r.full_name))
      );
      const addStart = el('input', { type: 'time', class: 'w-full rounded-lg border px-2 py-2 text-sm', value: slot.slot_start, style: { borderColor: 'var(--border-2)' } });
      const addEnd   = el('input', { type: 'time', class: 'w-full rounded-lg border px-2 py-2 text-sm', value: slot.slot_end,   style: { borderColor: 'var(--border-2)' } });
      const repeatChk = el('input', { type: 'checkbox', checked: true, class: 'mr-2' });
      const weekday = weekdayName(iso);
      const addRow = el('div', { class: 'px-5 py-4 flex flex-col gap-2' },
        el('div', { class: 'text-xs font-bold uppercase tracking-wider text-muted-' }, 'Add a rep'),
        addSelect,
        el('div', { class: 'flex items-center gap-2' },
          el('label', { class: 'text-[10px] font-semibold flex-1 text-muted-' }, 'Start', addStart),
          el('label', { class: 'text-[10px] font-semibold flex-1 text-muted-' }, 'End',   addEnd),
        ),
        el('label', { class: 'flex items-center text-xs' },
          repeatChk,
          el('span', {}, `Repeat every ${weekday} for the next 12 weeks`),
        ),
        el('div', { class: 'text-[10px] text-muted-' },
          `Leave times at ${fmtTime(slot.slot_start)}–${fmtTime(slot.slot_end)} for a full shift, or narrow them for partial coverage.`),
        el('button', {
          class: 'rounded-lg px-4 py-2.5 text-sm font-bold transition hover:brightness-95',
          style: { background: 'var(--accent)', color: 'var(--accent-text)' },
          onclick: () => {
            const repId = addSelect.value;
            if (!repId) { toast('Pick a rep', 'warn'); return; }
            const start = addStart.value || slot.slot_start;
            const end   = addEnd.value   || slot.slot_end;
            if (start >= end) { toast('End must be after start', 'warn'); return; }
            if (start < slot.slot_start || end > slot.slot_end) {
              toast(`Must stay within ${fmtTime(slot.slot_start)}–${fmtTime(slot.slot_end)}`, 'warn');
              return;
            }
            const isRecurring = repeatChk.checked;
            const baseDate = new Date(iso + 'T00:00');
            const baseDow  = baseDate.getDay();
            let added = 0;
            const pushOne = (targetIso) => {
              // Skip duplicates (same rep already on this slot on this date)
              if (state.shifts.some(s => s.date === targetIso && s.slot_id === slotId && s.rep_id === repId)) return;
              state.shifts.push({
                id: `shift-${targetIso}-${slotId}-${repId}-${Date.now()}-${added}`,
                date: targetIso, slot_id: slotId,
                slot_start: slot.slot_start, slot_end: slot.slot_end,
                rep_id: repId, start, end, note: '',
                recurring: isRecurring,
              });
              added += 1;
            };
            pushOne(iso);
            if (isRecurring) {
              const until = new Date(baseDate); until.setDate(baseDate.getDate() + 7 * 12);
              for (let d = new Date(baseDate); d <= until; d.setDate(d.getDate() + 1)) {
                if (d.getDay() !== baseDow) continue;
                const dIso = isoDate(d);
                if (dIso === iso) continue;
                // Only add if this date actually has this slot in its template
                if (!shiftSlotsForDate(dIso).some(s => s.slot_id === slotId)) continue;
                pushOne(dIso);
              }
            }
            saveDemoData();
            toast(isRecurring
              ? `Added recurring (${added} ${weekday}${added === 1 ? '' : 's'})`
              : 'Added to shift',
              'success');
            redraw();
          },
        }, '+ Add to shift'),
      );
      body.append(addRow);
    }

    card.append(header, body);
    overlay.innerHTML = '';
    overlay.append(card);
  };
  const redraw = () => { render(); mountApp(); };
  render();
  document.body.append(overlay);
}

function assignmentRow(a, slot, reps, repById, meId, isAdmin, redraw) {
  const rep = repById[a.rep_id];
  const isMine = a.rep_id === meId;
  const isPartial = a.start !== slot.slot_start || a.end !== slot.slot_end;
  const pendingReq = state.shiftSwapRequests.find(r => r.shift_id === a.id && r.status === 'pending');
  const wrap = el('div', { class: 'rounded-lg border p-2.5 flex flex-col gap-2', style: {
    borderColor: isMine ? 'var(--accent)' : 'var(--border)',
    background: isMine ? 'rgba(141,198,63,0.08)' : 'var(--card-2)',
  } });
  wrap.append(
    el('div', { class: 'flex items-center justify-between gap-2' },
      el('div', { class: 'flex-1 min-w-0 flex items-center gap-2' },
        el('span', {
          class: 'inline-flex items-center justify-center rounded-full text-[10px] font-bold flex-shrink-0',
          style: { width: '24px', height: '24px', background: isMine ? 'var(--accent)' : 'var(--card)', color: isMine ? 'var(--accent-text)' : 'var(--text)', border: '1px solid var(--border-2)' },
        }, repInitials(rep)),
        el('div', { class: 'flex-1 min-w-0' },
          el('div', { class: 'text-sm font-semibold truncate flex items-center gap-1.5' },
            rep?.full_name || 'Unknown',
            isRecurring(a) && el('span', {
              class: 'text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded',
              style: { background: 'var(--card)', color: 'var(--text-muted)', border: '1px solid var(--border)' },
              title: `Repeats every ${weekdayName(a.date)}`,
            }, '↻ Weekly'),
          ),
          el('div', { class: 'text-[11px] text-muted-' },
            isPartial ? `${fmtTime(a.start)}–${fmtTime(a.end)} · partial` : 'Full shift'),
        ),
      ),
      pendingReq && el('span', {
        class: 'text-[9px] font-bold uppercase tracking-wider px-2 py-1 rounded whitespace-nowrap',
        style: { background: 'rgba(245, 158, 11, 0.15)', color: '#B45309' },
      }, pendingReq.from_rep_id === meId ? 'Waiting' : 'Incoming'),
    ),
  );

  const actions = el('div', { class: 'flex flex-wrap gap-1.5' });
  const btn = (label, onclick, variant) => el('button', {
    class: 'rounded-lg px-3 py-1.5 text-xs font-semibold' + (variant === 'primary' ? '' : ' border'),
    style: variant === 'primary'
      ? { background: 'var(--accent)', color: 'var(--accent-text)' }
      : variant === 'danger'
        ? { borderColor: 'var(--border-2)', color: 'var(--text-muted)' }
        : { borderColor: 'var(--border-2)', color: 'var(--text)' },
    onclick,
  }, label);

  if (isAdmin) {
    // ── Admin: full edit on every row, no transfer flow needed (reassign is direct) ──
    actions.append(
      btn('Reassign', () => openReassignSheet(a, reps, redraw)),
      btn('Edit time', () => openEditTimesSheet(a, slot, redraw)),
      btn('Split', () => openSplitSheet(a, slot, redraw)),
      btn('Remove', () => {
        applyRecurringChange(a, 'Remove', (scope) => {
          const victims = findRecurringSiblings(a, scope);
          const ids = new Set(victims.map(s => s.id));
          state.shifts = state.shifts.filter(s => !ids.has(s.id));
          state.shiftSwapRequests = state.shiftSwapRequests.filter(r => !ids.has(r.shift_id));
        }, redraw);
      }, 'danger'),
    );
    // Admin can also accept/decline if they happen to be the target of a swap
    if (pendingReq && pendingReq.to_rep_id === meId) {
      actions.append(
        btn('Accept', () => { resolveSwap(pendingReq.id, 'accepted'); redraw(); }, 'primary'),
        btn('Decline', () => { resolveSwap(pendingReq.id, 'declined'); redraw(); }),
      );
    }
  } else {
    // ── Rep (non-admin): only request-transfer on your own row, and accept/decline on incoming ──
    if (isMine && !pendingReq) {
      actions.append(btn('Request transfer', () => openTransferSheet(a, reps, redraw), 'primary'));
    } else if (isMine && pendingReq && pendingReq.from_rep_id === meId) {
      const toRep = repById[pendingReq.to_rep_id];
      actions.append(
        el('span', { class: 'text-xs text-muted- flex-1' }, 'Awaiting ' + (toRep?.full_name?.split(' ')[0] || 'rep') + '…'),
        btn('Cancel', () => { resolveSwap(pendingReq.id, 'cancelled'); redraw(); }),
      );
    } else if (!isMine && pendingReq && pendingReq.to_rep_id === meId) {
      actions.append(
        btn('Accept', () => { resolveSwap(pendingReq.id, 'accepted'); redraw(); }, 'primary'),
        btn('Decline', () => { resolveSwap(pendingReq.id, 'declined'); redraw(); }),
      );
    }
  }

  if (actions.children.length > 0) wrap.append(actions);
  return wrap;
}

function openSplitSheet(assignment, slot, redraw) {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const toM = (hhmm) => { const [h,m] = hhmm.split(':').map(Number); return h*60+m; };
  const toS = (mins) => `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
  const midMins = Math.round(((toM(assignment.start) + toM(assignment.end)) / 2) / 15) * 15;
  const splitAt = el('input', { type: 'time', class: 'w-full rounded-lg border px-2 py-2 text-sm', value: toS(midMins), style: { borderColor: 'var(--border-2)' } });
  const card = el('div', { class: 'card w-full max-w-sm my-8 overflow-hidden' },
    el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
      el('h2', { class: 'text-base font-bold' }, 'Split shift'),
      el('button', { class: 'rounded-lg border px-3 py-1.5 text-xs', style: { borderColor: 'var(--border-2)' }, onclick: () => overlay.remove() }, 'Cancel'),
    ),
    el('div', { class: 'px-5 py-4 flex flex-col gap-3' },
      el('p', { class: 'text-sm text-muted-' },
        `Your ${fmtTime(assignment.start)}–${fmtTime(assignment.end)} shift will be split in two. You keep both halves — then Transfer just the half you need covered.`),
      el('label', { class: 'block text-xs font-semibold' }, 'Split at', splitAt),
      el('button', {
        class: 'rounded-lg px-4 py-2.5 text-sm font-bold',
        style: { background: 'var(--accent)', color: 'var(--accent-text)' },
        onclick: () => {
          const t = splitAt.value;
          if (!t || t <= assignment.start || t >= assignment.end) {
            toast(`Pick a time between ${fmtTime(assignment.start)} and ${fmtTime(assignment.end)}`, 'warn');
            return;
          }
          const original = state.shifts.find(s => s.id === assignment.id);
          if (!original) return;
          const wasRecurring = isRecurring(original);
          // Split is always a one-off — unlink both halves from the recurring series
          original.recurring = false;
          const secondHalf = { ...original, id: original.id + '-b-' + Date.now(), start: t, end: original.end, recurring: false };
          original.end = t;
          state.shifts.push(secondHalf);
          saveDemoData();
          overlay.remove();
          toast(wasRecurring ? 'Shift split (this day only, series intact)' : 'Shift split', 'success');
          redraw();
        },
      }, 'Split'),
    ),
  );
  overlay.append(card);
  document.body.append(overlay);
}

function openTransferSheet(assignment, reps, redraw) {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const meId = state.profile.id;
  const others = reps.filter(r => r.id !== meId && r.is_active !== false);
  const target = el('select', { class: 'w-full rounded-lg border px-3 py-2 text-sm', style: { borderColor: 'var(--border-2)' } },
    el('option', { value: '' }, 'Choose rep…'),
    ...others.map(r => el('option', { value: r.id }, r.full_name))
  );
  const note = el('textarea', {
    class: 'w-full rounded-lg border px-3 py-2 text-sm', rows: 2,
    placeholder: 'Optional note…', style: { borderColor: 'var(--border-2)' },
  });
  const card = el('div', { class: 'card w-full max-w-sm my-8 overflow-hidden' },
    el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
      el('h2', { class: 'text-base font-bold' }, 'Request transfer'),
      el('button', { class: 'rounded-lg border px-3 py-1.5 text-xs', style: { borderColor: 'var(--border-2)' }, onclick: () => overlay.remove() }, 'Cancel'),
    ),
    el('div', { class: 'px-5 py-4 flex flex-col gap-3' },
      el('p', { class: 'text-sm text-muted-' }, `Transferring ${fmtTime(assignment.start)}–${fmtTime(assignment.end)}. The other rep has to accept.`),
      el('label', { class: 'block text-xs font-semibold' }, 'Transfer to', target),
      el('label', { class: 'block text-xs font-semibold' }, 'Note', note),
      el('button', {
        class: 'rounded-lg px-4 py-2.5 text-sm font-bold',
        style: { background: 'var(--accent)', color: 'var(--accent-text)' },
        onclick: () => {
          const toId = target.value;
          if (!toId) { toast('Pick a rep', 'warn'); return; }
          state.shiftSwapRequests.push({
            id: 'swap-' + Date.now(),
            shift_id: assignment.id,
            from_rep_id: meId, to_rep_id: toId,
            status: 'pending', note: note.value.trim(),
            created_at: new Date().toISOString(), resolved_at: null,
          });
          saveDemoData();
          overlay.remove();
          toast('Transfer requested', 'success');
          redraw();
        },
      }, 'Request transfer'),
    ),
  );
  overlay.append(card);
  document.body.append(overlay);
}

// ── Admin-only: directly reassign an assignment to a different rep ────────
function openReassignSheet(assignment, reps, redraw) {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const currentRep = reps.find(r => r.id === assignment.rep_id);
  const others = reps.filter(r => r.id !== assignment.rep_id && r.is_active !== false);
  const target = el('select', { class: 'w-full rounded-lg border px-3 py-2 text-sm', style: { borderColor: 'var(--border-2)' } },

// ── Admin-only: edit an assignment's start/end times (within slot bounds) ─
function openEditTimesSheet(assignment, slot, redraw) {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const startInput = el('input', { type: 'time', class: 'w-full rounded-lg border px-2 py-2 text-sm', value: assignment.start, style: { borderColor: 'var(--border-2)' } });
  const endInput   = el('input', { type: 'time', class: 'w-full rounded-lg border px-2 py-2 text-sm', value: assignment.end,   style: { borderColor: 'var(--border-2)' } });
  const card = el('div', { class: 'card w-full max-w-sm my-8 overflow-hidden' },
    el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
      el('h2', { class: 'text-base font-bold' }, 'Edit shift time'),
      el('button', { class: 'rounded-lg border px-3 py-1.5 text-xs', style: { borderColor: 'var(--border-2)' }, onclick: () => overlay.remove() }, 'Cancel'),
    ),
    el('div', { class: 'px-5 py-4 flex flex-col gap-3' },
      el('p', { class: 'text-sm text-muted-' },
        `Slot runs ${fmtTime(slot.slot_start)}–${fmtTime(slot.slot_end)}. Narrower times = partial coverage.`),
      el('div', { class: 'flex items-center gap-2' },
        el('label', { class: 'text-[10px] font-semibold flex-1 text-muted-' }, 'Start', startInput),
        el('label', { class: 'text-[10px] font-semibold flex-1 text-muted-' }, 'End',   endInput),
      ),
      el('button', {
        class: 'rounded-lg px-4 py-2.5 text-sm font-bold',
        style: { background: 'var(--accent)', color: 'var(--accent-text)' },
        onclick: () => {
          const start = startInput.value;
          const end   = endInput.value;
          if (!start || !end || start >= end) { toast('End must be after start', 'warn'); return; }
          if (start < slot.slot_start || end > slot.slot_end) {
            toast(`Must stay within ${fmtTime(slot.slot_start)}–${fmtTime(slot.slot_end)}`, 'warn');
            return;
          }
          overlay.remove();
          applyRecurringChange(assignment, 'Update times on', (scope) => {
            const affected = findRecurringSiblings(assignment, scope);
            affected.forEach(s => { s.start = start; s.end = end; });
            if (scope === 'this') {
              const shift = state.shifts.find(s => s.id === assignment.id);
              if (shift) shift.recurring = false;
            }
          }, redraw);
        },
      }, 'Save'),
    ),
  );
  overlay.append(card);
  document.body.append(overlay);
}

const RIDD_COLOR = '#8DC63F';
// Default palette for teams. Avoids red so excluded teams keep their distinct
// red tint. Teams without an explicit user-picked color are assigned one
// deterministically from this list (hash of team name → palette index) so the
// same team always renders in the same color across charts and tables.

// mid-value hues that read as a coordinated brand-extended set rather than a
// rainbow. Lime sibling first so it ties back to the brand; reds avoided

const TEAM_COLOR_PALETTE = [
  '#5C8A1A', // deep lime — anchors to the brand accent
  '#3D7A66', // pine
  '#2D6E8C', // teal-blue
  '#476BA8', // royal blue

  '#6B7A8E', // slate
  '#8E5A3A', // chestnut
];
function _hashStr(s) {
  let h = 0; const str = String(s || '');
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i) | 0;
  return Math.abs(h);
}
function defaultTeamColor(name) {
  return TEAM_COLOR_PALETTE[_hashStr(name) % TEAM_COLOR_PALETTE.length];
}
function getTeamColor(name) {
  if (!name) return '#666';

function setTeamColor(name, hex) {

// Resolve the color for a group key (branch name or team name) based on the
// current Indicators groupBy mode. Used everywhere a chart/table colors a
// row by its group identity so branch and team views stay symmetrical.
function getGroupColor(name) {
  if (!name) return '#666';
  if (state.indicatorsGroupBy === 'teams') return getTeamColor(name);
  return BRANCH_COLORS[name] || BRANCH_COLORS[String(name).toUpperCase()] || '#666';

// Date-range presets for the Indicators view. The toggle was Weekly | Cumulative;
// it's now Weekly | Range, with these presets behind the dropdown. YTD is the
// default; "Since March 1" mirrors the old "summer cutoff" if you want it.
const INDICATOR_RANGE_PRESETS = [
  { id: 'ytd',         label: 'Year to Date' },
  { id: 'since_mar1',  label: 'Since March 1' },
  { id: '90d',         label: 'Last 90 Days' },
  { id: '60d',         label: 'Last 60 Days' },
  { id: '30d',         label: 'Last 30 Days' },
  { id: 'custom',      label: 'Custom…' },
];

function indicatorRangeBounds(preset, custom) {
  const today = new Date();
  const todayIso = today.toISOString().slice(0, 10);
  const year = today.getFullYear();
  const minus = (n) => new Date(today.getTime() - n * 86400000).toISOString().slice(0, 10);
  switch (preset) {
    case 'since_mar1': return { start: `${year}-03-01`, end: todayIso };
    case '90d':        return { start: minus(90),       end: todayIso };
    case '60d':        return { start: minus(60),       end: todayIso };
    case '30d':        return { start: minus(30),       end: todayIso };
    case 'custom':     return { start: custom?.start || `${year}-01-01`, end: custom?.end || todayIso };
    case 'ytd':
    default:           return { start: `${year}-01-01`, end: todayIso };
  }
}

// Best-effort week-start ISO parsing. Raw-sales path stamps an explicit iso_start
// on every row. Pre-aggregated CSVs only have a "M/D-M/D" date label; we parse
// the first half and pin to the upload year (today's year — accurate for YTD).
function indicatorWeekStartIso(row) {
  if (row && row.iso_start) return row.iso_start;
  const m = (row?.date || '').match(/^(\d{1,2})\/(\d{1,2})/);
  if (!m) return null;
  const year = new Date().getFullYear();
  return `${year}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
}
function isInIndicatorRange(row, bounds) {
  const iso = indicatorWeekStartIso(row);
  if (!iso) return true; // unknown — keep, don't silently drop
  return iso >= bounds.start && iso <= bounds.end;
}

// ── Rep-team assignment helpers ──────────────────────────────────────────
// Each rep can be assigned to a team string. Any team whose name is in
// state._indicatorExcludedTeams is dropped from every rep-level metric
// (leaderboard, performance chart, cancel analysis, subscription mix, branch
// rollups). The literal "Excluded" name is the default-excluded team for
// fresh data so existing demo assignments keep working.
const REP_EXCLUDED_TEAM = 'Excluded';
function getRepTeam(repName) {
  if (!repName) return '';
  const map = state._indicatorRepTeam || {};
  return map[repName] || '';
}
function setRepTeam(repName, team) {
  if (!state._indicatorRepTeam) state._indicatorRepTeam = {};
  if (!team) delete state._indicatorRepTeam[repName];
  else       state._indicatorRepTeam[repName] = team;
  saveDemoData();
}
// Lazily seeded with the legacy "Excluded" team so reps already assigned
// there stay hidden after upgrade — first read on a fresh state will populate
// the field with ['Excluded'].
function getExcludedTeams() {
  if (!Array.isArray(state._indicatorExcludedTeams)) {
    state._indicatorExcludedTeams = [REP_EXCLUDED_TEAM];
  }
  return state._indicatorExcludedTeams;
}
function isTeamExcluded(teamName) {
  if (!teamName) return false;
  return getExcludedTeams().includes(teamName);
}
function setTeamExcluded(teamName, excluded) {
  if (!teamName) return;
  const list = getExcludedTeams();
  const idx = list.indexOf(teamName);
  if (excluded && idx === -1) list.push(teamName);
  else if (!excluded && idx !== -1) list.splice(idx, 1);
  saveDemoData();
}
function isRepExcluded(repName) {
  return isTeamExcluded(getRepTeam(repName));
}

// Independent of team: each rep can be tagged 'rookie' | 'vet' (or unset).
const REP_TIERS = [

// Active/inactive flag — defaults to active. Reserved for competitions/PRA

function isRepActive(repName) {

  return map[repName] !== false;

// Build indicator-shaped rows aggregated by an arbitrary key (branch, team, …).
//   - applyExclusion: drop reps on excluded teams. Team view → true, branch view → false.
//   - pestExcludeRegex: strip subscription types from the avg_initial calc.
//     Team view passes the strict regex (Sentricon + German Roach + Interior
//     Flea); branch view passes null so the column is a true "Avg Initial"
//     across every account type with no carve-outs.
function aggregateRawSalesByGroup(rawSales, getGroupKey, indicatorRowsForDates, applyExclusion = false, pestExcludeRegex = null) {
  const weekMeta = {};
  (indicatorRowsForDates || []).forEach(r => {
    if (weekMeta[r.week]) return;
    weekMeta[r.week] = { date: r.date, iso_start: r.iso_start };
  });

  const groups = {}; // key = groupKey + '|' + week
  (rawSales || []).forEach(s => {
    if (!s.rep) return;
    if (applyExclusion && isRepExcluded(s.rep)) return; // team view only
    const groupKey = getGroupKey(s);
    if (!groupKey) return;
    const key = groupKey + '|' + s.week;
    if (!groups[key]) groups[key] = { groupKey, week: s.week, sales: [] };
    groups[key].sales.push(s);
  });

  return Object.values(groups).map(g => {
    const ss = g.sales;
    const count = ss.length;
    const revenue = ss.reduce((a, s) => a + (Number(s.contractValue) || 0), 0);
    const pest = pestExcludeRegex ? ss.filter(s => !pestExcludeRegex.test(s.subscription || '')) : ss;
    const avgInit = pest.length > 0 ? pest.reduce((a, s) => a + (Number(s.initialPrice) || 0), 0) / pest.length : 0;
    const multiYears = ss.filter(s => Number(s.contract) > 12).length;
    const twelveMonth = ss.filter(s => Number(s.contract) === 12).length;
    const autoPayCount = ss.filter(s => s.autoPay && s.autoPay !== 'No').length;
    const uniqueReps = new Set(ss.map(s => s.rep).filter(Boolean)).size;
    const meta = weekMeta[g.week] || {};
    return {
      week: g.week,
      date: meta.date || '',
      iso_start: meta.iso_start || null,
      branch: g.groupKey, // reuse 'branch' field — the rest of the page reads it generically
      sold_accounts: count,
      revenue,
      avg_initial: avgInit,
      avg_initial_count: pest.length,
      auto_pay_pct: count > 0 ? autoPayCount / count : 0,
      multi_years: multiYears,
      twelve_month: twelveMonth,
      reps: uniqueReps,
    };
  });
}
// Subscription exclusions used at the team-aggregation level — the same
// strict list rep-level analytics use, kept here so team rollups treat
// non-pest accounts the same way.
const TEAM_PEST_EXCLUDE = /sentricon|german\s*roach|interior\s*flea/i;

function aggregateByBranch(rawSales, indicatorRowsForDates) {
  // Branch totals include every rep AND every subscription type — no exclusions.
  return aggregateRawSalesByGroup(rawSales, s => s.office || 'Unknown', indicatorRowsForDates, false, null);
}
function aggregateByTeam(rawSales, indicatorRowsForDates) {
  // Team view honors both team exclusions and the strict pest-subscription regex.
  return aggregateRawSalesByGroup(rawSales, s => getRepTeam(s.rep) || 'Unassigned', indicatorRowsForDates, true, TEAM_PEST_EXCLUDE);
}

// Dynamic label for the avg_initial column — branch view shows the unfiltered
// "Avg Initial" (every account type counts); team view shows "Avg Pest
// Initial" because it strips Sentricon/Roach/Flea from the average.
function indicatorMetricLabel(metric) {
  if (metric && metric.key === 'avg_initial') {
    return state.indicatorsGroupBy === 'teams' ? 'Avg Pest Initial' : 'Avg Initial';
  }
  return metric ? metric.label : '';
}
// Teams now have an explicit registry (state._indicatorTeams) so they survive
// when no rep is assigned. distinctTeams() unions the registry + any teams
// referenced by current assignments, so legacy assignments still work even if
// they pre-date the registry.
function distinctTeams() {
  const map = state._indicatorRepTeam || {};
  const registry = state._indicatorTeams || [];
  // Surface every currently-excluded team so users can manage them. On fresh
  // state, getExcludedTeams() seeds itself with ['Excluded']; once the user
  // removes a team it stays gone (no hardcoded re-seed here).
  const set = new Set(getExcludedTeams());
  registry.forEach(t => { if (t) set.add(t); });
  Object.values(map).forEach(t => { if (t) set.add(t); });
  return [...set].sort((a, b) => {
    const ax = isTeamExcluded(a), bx = isTeamExcluded(b);
    if (ax !== bx) return ax ? 1 : -1; // excluded teams sort last
    return a.localeCompare(b);
  });
}
function addTeam(name) {
  const clean = (name || '').trim();
  if (!clean) return false;
  if (!state._indicatorTeams) state._indicatorTeams = [];
  if (state._indicatorTeams.some(t => t.toLowerCase() === clean.toLowerCase())) return false;
  state._indicatorTeams.push(clean);
  saveDemoData();
  return true;
}
function removeTeam(name) {
  if (!name) return;
  if (state._indicatorTeams) {
    state._indicatorTeams = state._indicatorTeams.filter(t => t !== name);
  }
  // Unassign any rep currently on that team
  const map = state._indicatorRepTeam || {};
  Object.keys(map).forEach(r => { if (map[r] === name) delete map[r]; });
  // Drop from the excluded list too — no orphaned exclusion entries
  if (Array.isArray(state._indicatorExcludedTeams)) {
    state._indicatorExcludedTeams = state._indicatorExcludedTeams.filter(t => t !== name);
  }

}
function renameTeam(oldName, newNameRaw) {
  const newName = (newNameRaw || '').trim();
  if (!oldName) return { ok: false, error: 'Missing team name' };
  if (!newName) return { ok: false, error: 'Name required' };
  if (newName === oldName) return { ok: true, noop: true };
  // Case-insensitive duplicate check (allow case-only changes of the same team)
  const others = (state._indicatorTeams || []).filter(t => t !== oldName);
  if (others.some(t => t.toLowerCase() === newName.toLowerCase())) return { ok: false, error: 'Another team with that name already exists' };
  // Rename in the registry, preserving order
  if (!state._indicatorTeams) state._indicatorTeams = [];
  state._indicatorTeams = state._indicatorTeams.map(t => t === oldName ? newName : t);
  // Rename in every rep assignment
  const map = state._indicatorRepTeam || {};
  Object.keys(map).forEach(r => { if (map[r] === oldName) map[r] = newName; });
  // Carry the rename into the modal's active filter so the filter doesn't break
  if (state._indicatorManageTeamFilter === oldName) state._indicatorManageTeamFilter = newName;
  if (state._indicatorRepTeamFilter === oldName)   state._indicatorRepTeamFilter   = newName;
  // Carry the rename into the excluded-teams list so the exclusion follows
  if (Array.isArray(state._indicatorExcludedTeams)) {
    state._indicatorExcludedTeams = state._indicatorExcludedTeams.map(t => t === oldName ? newName : t);
  }
  saveDemoData();
  return { ok: true };
}

function openManageTeamsModal() {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  const card = el('div', { class: 'card w-full max-w-2xl my-8 overflow-hidden flex flex-col', style: { maxHeight: 'calc(100vh - 64px)' } });

  const render = () => {
    const rawSales = state._indicatorRawSales || [];
    const reps = [...new Set(rawSales.map(s => s.rep).filter(Boolean))].sort();
    const teams = distinctTeams();

    const search = state._indicatorTeamSearch || '';
    const teamSelect = state._indicatorManageTeamFilter || ''; // '' = all, '(unassigned)' = no team

    // Counts per team for the summary chips
    const counts = {};
    reps.forEach(r => { const t = getRepTeam(r) || '(unassigned)'; counts[t] = (counts[t] || 0) + 1; });

    // For each rep, figure out their primary office (most-frequent office across
    // their sales). Read-only — purely informational so admins can sanity-check
    // the assignment before tagging a tier or team.
    const repToOffice = {};
    rawSales.forEach(s => {
      if (!s.rep || !s.office) return;
      if (!repToOffice[s.rep]) repToOffice[s.rep] = {};
      repToOffice[s.rep][s.office] = (repToOffice[s.rep][s.office] || 0) + 1;
    });
    const primaryOffice = (rep) => {
      const counts = repToOffice[rep] || {};
      const entries = Object.entries(counts);
      if (entries.length === 0) return '';
      return entries.sort((a, b) => b[1] - a[1])[0][0];
    };
    const titleCase = (s) => (s || '').split(' ').map(w => w[0]?.toUpperCase() + w.slice(1).toLowerCase()).join(' ');

    let filteredReps = reps;
    if (teamSelect) {
      filteredReps = filteredReps.filter(r => {
        const t = getRepTeam(r) || '(unassigned)';
        return t === teamSelect;
