<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#FFFFFF" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>RIDD Sales App</title>

<!-- ───────────────────────── STYLES ───────────────────────── -->
<!-- Tailwind is PREBUILT into tailwind.css. It used to load the Play CDN —
     a ~350KB render-blocking compiler that re-scanned the whole DOM on every
     render, the single biggest cause of slow loads. If you add NEW utility
     classes, rebuild with:
       npx tailwindcss -c tailwind.config.js -i in.css -o tailwind.css --minify
     (config mirrors the old inline tailwind.config: RIDD colors + Inter font
     + forms/typography plugins, content: ['index.html']) -->
<link rel="stylesheet" href="tailwind.css" />
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<!-- Leaflet + Turf (the Geographic map stack, ~700KB) now load ON DEMAND
     from app.js (ensureMapLibs) the first time a map view renders — they
     no longer download on every page load. -->
<!-- (RIDD Tailwind tokens now live in the prebuilt tailwind.css — see note above.) -->
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<!-- Boot-path network warmup: the app can't render until the Supabase SDK
     module arrives and the session/profile queries answer — start those
     connections during HTML parse instead of after the 1.8MB script parses. -->
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RIDD" />
<link rel="preconnect" href="https://esm.sh" crossorigin />
<link rel="modulepreload" href="https://esm.sh/@supabase/supabase-js@2.45.4" />
<link rel="preconnect" href="https://iqlrndyuiolbxhhwmsqv.supabase.co" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&display=swap" />
<style>
  /* ═══════════════ THEME TOKENS ═══════════════ */
  :root[data-theme="light"] {
    --bg:          #FFFFFF;
    --bg-subtle:   #F7F7F5;
    --card:        #FFFFFF;
    --card-2:      #F6F6F4;
    --border:      #ECECEC;
    --border-2:    #DCDCDC;
    --text:        #0A0A0A;
    --text-muted:  #767676;
    --text-subtle: #A6A6A6;
    --input-bg:    #FFFFFF;
    --input-border:#DCDCDC;
    --header-bg:   #0A0A0A;
    --header-text: #FAFAFA;
    --sidebar-bg:  #FFFFFF;
    --sidebar-border:#ECECEC;
    --accent:      #8DC63F;
    --accent-hover:#7bb132;
    --accent-text: #0A0A0A;
    --shadow-sm:   0 1px 2px rgba(0,0,0,.03);
    --shadow:      0 1px 2px rgba(0,0,0,.05);
    --shadow-lg:   0 16px 40px -12px rgba(0,0,0,.12);
    --font-display: 'Anton', 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  :root[data-theme="dark"] {
    --bg:          #0B0B0B;
    --bg-subtle:   #111111;
    --card:        #141414;
    --card-2:      #1A1A1A;
    --border:      #242424;
    --border-2:    #313131;
    --text:        #F4F4F4;
    --text-muted:  #8A8A8A;
    --text-subtle: #5E5E5E;
    --input-bg:    #121212;
    --input-border:#313131;
    --header-bg:   #0B0B0B;
    --header-text: #F4F4F4;
    --sidebar-bg:  #0E0E0E;
    --sidebar-border:#242424;
    --accent:      #A4D65E;
    --accent-hover:#b6e277;
    --accent-text: #0A0A0A;
    --shadow-sm:   0 1px 2px rgba(0,0,0,.4);
    --shadow:      0 1px 3px rgba(0,0,0,.5);
    --shadow-lg:   0 16px 40px -12px rgba(0,0,0,.6);
    --font-display: 'Anton', 'Inter', ui-sans-serif, system-ui, sans-serif;
  }

  html {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;      /* crisp, macOS-style glyphs */
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'cv02','cv03','cv04','cv11';  /* Inter's cleaner alternates */
  }
  /* Variable Inter when available — smoother weights, sharper hinting. */
  @supports (font-variation-settings: normal) {
    html { font-family: 'Inter var', Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; }
  }
  body {
    background: var(--bg);
    color: var(--text);
    transition: background-color .15s ease, color .15s ease;
    /* Kill double-tap-to-zoom on iOS (the viewport meta blocks pinch; this
       blocks the double-tap gesture so taps also register ~300ms faster). */
    touch-action: manipulation;
  }
  /* The PAGE never pans sideways — any content wider than the screen must
     scroll inside its own .scroll-x container, not drag the whole app. */
  html, body { overflow-x: hidden; max-width: 100%; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    transition: background-color .15s ease, border-color .15s ease;
  }
  .card-2 {
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  /* Hypebeast display type — Anton poster face for tab titles + hero numbers. */
  .font-display { font-family: var(--font-display); font-weight: 400 !important; letter-spacing: .015em; }
  .hb-kicker { text-transform: uppercase; letter-spacing: .18em; font-weight: 700; }
  /* Every page / tab title + section header becomes a poster headline. Anton is
     a single weight, so force 400 to avoid synthetic-bold from font utilities. */
  h1, h2, h3 { font-family: var(--font-display); font-weight: 400 !important; letter-spacing: .02em; }
  h1 { font-size: clamp(2.5rem, 6vw, 6rem); line-height: .92; text-transform: uppercase; }
  h2 { letter-spacing: .01em; }
  /* Keep the fixed top-bar tab title compact (it lives in a ~60px header). */
  .hb-topbar-title { font-size: clamp(1.45rem, 2.6vw, 2.1rem) !important; line-height: 1 !important; text-transform: uppercase; }

  /* Text helpers driven by CSS vars */
  .text-default  { color: var(--text); }
  .text-muted-   { color: var(--text-muted); }
  .text-subtle-  { color: var(--text-subtle); }
  .bg-card-      { background: var(--card); }
  .bg-card2-     { background: var(--card-2); }
  .border-      { border-color: var(--border); }
  .border2-     { border-color: var(--border-2); }

  /* Chips */
  .chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:.02em; text-transform:uppercase; }
  .chip-pending   { background:rgba(141,198,63,.12); color:#5F8A1F; border:1px solid rgba(141,198,63,.35); }
  .chip-approved  { background:rgba(141,198,63,.18); color:#4A7119; border:1px solid rgba(141,198,63,.45); }
  .chip-serviced  { background:rgba(141,198,63,.14); color:#5F8A1F; border:1px solid rgba(141,198,63,.40); }
  .chip-below     { background:rgba(234,88,12,.10);  color:#B45309; border:1px solid rgba(234,88,12,.30); }
  .chip-nsf       { background:rgba(220,38,38,.10);  color:#B91C1C; border:1px solid rgba(220,38,38,.30); }
  .chip-rejected  { background:rgba(220,38,38,.15);  color:#991B1B; border:1px solid rgba(220,38,38,.45); }

  :root[data-theme="dark"] .chip-pending   { color:#a4d558; }
  :root[data-theme="dark"] .chip-approved  { color:#c7e68f; }
  :root[data-theme="dark"] .chip-serviced  { color:#a4d558; }
  :root[data-theme="dark"] .chip-below     { color:#ffcc7a; }
  :root[data-theme="dark"] .chip-nsf       { color:#fca5a5; }
  :root[data-theme="dark"] .chip-rejected  { color:#f87171; }

  /* Sidebar / nav buttons */
  .tab-btn {
    transition: all .15s ease;
    color: var(--text-muted);
  }
  .tab-btn:hover {
    background: var(--card-2);
    color: var(--text);
  }
  .tab-btn[data-active="true"] {
    background: var(--accent);
    color: var(--accent-text);
  }
  .tab-btn[data-active="true"] svg { stroke: var(--accent-text); }

  /* Inputs */
  input, select, textarea {
    background: var(--input-bg) !important;
    color: var(--text) !important;
    border: 1px solid var(--input-border) !important;
  }
  input::placeholder, textarea::placeholder { color: var(--text-subtle) !important; }
  input:focus, select:focus, textarea:focus {
    outline: none !important;
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 2px rgba(141,198,63,.25) !important;
  }

  /* Bingo card */
  .bingo-square {
    aspect-ratio: 1/1;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 8px; border-radius: 10px;
    border: 1px solid var(--border-2);
    background: var(--card-2);
    font-size: 11px; line-height: 1.2;
    color: var(--text-muted);
    transition: all .2s;
  }
  .bingo-square[data-met="true"] {
    background: rgba(141,198,63,.14);
    border-color: var(--accent);
    color: var(--text);
  }
  .bingo-square[data-met="true"] .check { opacity:1; transform:scale(1); }
  .bingo-square .check { opacity:0; transform:scale(.5); transition:all .2s; font-size:22px; color:var(--accent); }

  /* Scrollbars */
  .scroll-x { overflow-x:auto; scrollbar-width:thin; }
  .scroll-x::-webkit-scrollbar { height:6px; }
  .scroll-x::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:3px; }

  /* Spinner */
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(141,198,63,.25); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  /* Styled hover tooltip — replaces the browser's plain title bubble app-wide */
  .app-tip { position:fixed; z-index:10000; max-width:280px; padding:6px 10px; border-radius:8px;
    background:#1D1D1D; color:#F3F3F3; font-size:11px; font-weight:600; line-height:1.4;
    box-shadow:0 8px 24px rgba(0,0,0,.35); pointer-events:none; opacity:0; transition:opacity .12s; display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  /* RevHawk sync icon spinning while a refresh is in flight */
  .icon-spin svg { animation:spin .9s linear infinite; transform-origin:50% 50%; }

  .fade-in { animation:fade .2s ease; }
  /* Opacity-only on purpose: a transform here (even translateY(4px)) makes
     every position:fixed descendant — like the Indicators filter bar —
     anchor to this element instead of the viewport for the duration of the
     animation, so the bar visibly jumped down and snapped back on every
     re-render. */
  @keyframes fade { from { opacity:0; } to { opacity:1; } }

  /* Spring Cleaning mascot: walks slowly across the header while sweeping.
     He's drawn facing left, so scaleX(-1) faces him right when moving right.
     The walker handles the slow glide + flip; the img rocks (broom sweep);
     dust puffs kick up at the broom head. No vertical bob. */
  .sc-sweep-track { position:relative; flex:1 1 120px; min-width:144px; height:92px; align-self:stretch; overflow:hidden; }
  .sc-walker {
    position:absolute; bottom:0; left:0; width:80px; height:88px;
    transform-origin:center bottom;
    animation: scWalk 30s ease-in-out infinite;
    will-change:left, transform;
  }
  .sc-walker .sc-sweeper {
    position:absolute; bottom:0; left:0; height:84px; width:auto; display:block;
    transform-origin:46% 92%;
    animation: scSweep 2.6s ease-in-out infinite;
  }
  .sc-dust { position:absolute; bottom:2px; left:2px; width:32px; height:24px; pointer-events:none; }
  .sc-dust span {
    position:absolute; bottom:0; left:0; width:4px; height:4px; border-radius:50%;
    background: rgba(110,110,98,.5); opacity:0;
    animation: scDust 2.6s ease-out infinite;
  }
  .sc-dust span:nth-child(2) { left:5px;  width:3px;   height:3px;   animation-delay:.87s; }
  .sc-dust span:nth-child(3) { left:9px;  width:2.5px; height:2.5px; animation-delay:1.73s; }
  @keyframes scWalk {
    0%,3%    { left:0;                  transform:scaleX(-1); }
    47%      { left:calc(100% - 80px);  transform:scaleX(-1); }
    50%,53%  { left:calc(100% - 80px);  transform:scaleX(1); }
    97%      { left:0;                  transform:scaleX(1); }
    100%     { left:0;                  transform:scaleX(-1); }
  }
  @keyframes scSweep {
    0%,100% { transform:rotate(-5deg); }
    50%     { transform:rotate(3.5deg); }
  }
  @keyframes scDust {
    0%   { opacity:0;  transform:translate(0,0)      scale(.4); }
    25%  { opacity:.55; }
    100% { opacity:0;  transform:translate(-8px,-8px) scale(1.4); }
  }
  @media (prefers-reduced-motion: reduce) {
    .sc-walker { animation:none; left:calc(50% - 40px); transform:scaleX(-1); }
    .sc-walker .sc-sweeper, .sc-dust span { animation:none; }
    .sc-dust span { opacity:0; }
  }

  /* Top Gun mascot: a stealth bomber glides slowly back and forth across the
     header. Drawn nose-right, so scaleX(-1) faces it left when flying left.
     The flyer handles the glide + flip; the plane banks gently. */
  .tg-fly-track { position:relative; flex:1 1 90px; min-width:96px; height:48px; align-self:center; overflow:hidden; }
  .tg-flyer {
    position:absolute; top:50%; left:0; width:56px; margin-top:-15px;
    animation: tgFly 22s ease-in-out infinite;
    will-change:left, transform;
  }
  .tg-flyer .tg-plane {
    display:block; width:56px; height:auto;
    transform-origin:center center;
    animation: tgBank 4.5s ease-in-out infinite;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25));
  }
  @keyframes tgFly {
    0%,3%    { left:0;                  transform:scaleX(1); }
    47%      { left:calc(100% - 56px);  transform:scaleX(1); }
    50%,53%  { left:calc(100% - 56px);  transform:scaleX(-1); }
    97%      { left:0;                  transform:scaleX(-1); }
    100%     { left:0;                  transform:scaleX(1); }
  }
  @keyframes tgBank {
    0%,100% { transform:rotate(-4deg); }
    50%     { transform:rotate(4deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .tg-flyer { animation:none; left:calc(50% - 28px); }
    .tg-flyer .tg-plane { animation:none; }
  }

  /* Goal progress bar track */
  .goal-track {
    background: var(--border);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }
  .goal-fill {
    background: var(--accent);
    height: 100%;
    border-radius: 999px;
    transition: width .3s ease;
  }
  .goal-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-subtle);
  }

  /* Installed app (home-screen / standalone): with viewport-fit=cover the
     canvas runs edge-to-edge UNDER the iPhone status bar and home indicator,
     and there's no browser chrome to push content down — so the top of every
     screen (and modal) was getting clipped. Pad by the device's safe areas;
     env() resolves to 0 everywhere else, so browsers are unaffected. */
  @media all and (display-mode: standalone) {
    .page-header { padding-top: calc(1rem + env(safe-area-inset-top)) !important; }
    body { padding-bottom: env(safe-area-inset-bottom); }
    .modal-overlay > * {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* EVERY fixed-position offset must grow by the same inset the header
       grew by, or content tucks under it (the "cut-off dropdowns" bug):
       main reserves the fixed header's height; the Indicators filter bar
       pins below the header. */
    main { padding-top: calc(76px + env(safe-area-inset-top)) !important; }
    #indFixedBar { top: calc(60px + env(safe-area-inset-top)) !important; }
  }

  /* Floating tooltip (rendered to body so it escapes card overflow:hidden) */
  .ridd-tooltip {
    position: fixed;
    background: var(--eerie, #1D1D1D);
    color: #F3F3F3;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.4;
    pointer-events: none;
    z-index: 10001;  /* above modal overlays (2000) — chart tips were invisible inside the rep drill-down */
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    max-width: 240px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .12s ease, transform .12s ease;
    white-space: normal;
  }
  .ridd-tooltip.show { opacity: 1; transform: translateY(0); }
  .ridd-tooltip strong { color: #8DC63F; display: block; font-size: 11px; margin-bottom: 2px; }
  .ridd-tooltip .desc { color: rgba(243,243,243,.82); font-size: 11px; white-space: pre-line; }
  .ridd-tooltip.wide { max-width: 340px; }
  .ridd-tooltip::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px;
    background: var(--eerie, #1D1D1D);
  }
  /* Flipped-below variant: arrow moves to the top edge */
  .ridd-tooltip.below::after { bottom: auto; top: -5px; }
  :root[data-theme="light"] .ridd-tooltip { background: #1D1D1D; }
  :root[data-theme="light"] .ridd-tooltip::after { background: #1D1D1D; }
  .tooltip-trigger { cursor: help; }

  /* Header bar */
  .page-header {
    background: var(--header-bg);
    color: var(--header-text);
  }
  .page-header .icon-btn {
    background: rgba(255,255,255,.08);
    border-radius: 999px;
    width: 36px; height: 36px;
    align-items: center; justify-content: center;
    color: var(--header-text);
    transition: background .15s ease;
    /* Anchor for .notif-badge — without this the absolute-positioned
       badge escapes to the page-header / body and floats free. */
    position: relative;
  }
  .page-header .icon-btn.show { display: inline-flex; }
  .page-header .icon-btn:hover { background: rgba(255,255,255,.15); }

  /* Floating Action Button */
  .fab {
    position: fixed; right: 20px; bottom: 20px;
    background: var(--accent); color: var(--accent-text);
    border-radius: 999px; padding: 14px 22px;
    font-weight: 700; font-size: 14px;
    box-shadow: var(--shadow-lg);
    z-index: 30;
    display: inline-flex; align-items: center; gap: 6px;
    transition: transform .15s ease, background .15s ease;
  }
  .fab:hover { background: var(--accent-hover); transform: translateY(-1px); }

  /* Modal overlay — z-index must beat Leaflet's controls (max 1000) so
     the Reporting tab's drill modals don't get drawn under the map. */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,.55);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; overflow-y: auto;
    backdrop-filter: blur(2px);
  }

  /* Tabs (pill-style for Revenue Goal) */
  .pill-tabs {
    display: inline-flex; padding: 4px; gap: 4px;
    background: var(--card-2); border-radius: 999px; border: 1px solid var(--border);
  }
  .pill-tabs button {
    padding: 6px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    transition: all .15s ease;
  }
  .pill-tabs button[data-active="true"] {
    background: var(--text);
    color: var(--bg);
  }

  /* Sidebar transitions */
  .sidebar { background: var(--sidebar-bg); border-color: var(--sidebar-border); }

  /* Notification bell badge */
  .notif-badge {
    position: absolute; top: -2px; right: -2px;
    min-width: 16px; height: 16px; border-radius: 50%;
    background: #DC2626; color: #fff;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; line-height: 1;
  }
  .notif-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    width: 340px; max-height: 420px; overflow-y: auto;
    z-index: 40; display: none;
  }

  /* Global search bar */
  .search-bar { position: relative; flex: 1; max-width: 360px; margin: 0 12px; }
  .search-bar input {
    width: 100%; border-radius: 999px !important;
    padding: 7px 14px 7px 36px !important; font-size: 13px;
    background: rgba(255,255,255,.1) !important;
    border: 1px solid rgba(255,255,255,.15) !important;
    color: var(--header-text) !important;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,.4) !important; }
  .search-bar input:focus { background: rgba(255,255,255,.18) !important; border-color: rgba(255,255,255,.3) !important; }
  .search-bar .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.4); pointer-events: none;
  }
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    max-height: 320px; overflow-y: auto; z-index: 40;
    /* The dropdown lives inside the dark header — without an explicit color
       override, the cream header-text leaks down through the card and the
       customer name renders nearly invisible on the white card background. */
    color: var(--text);
  }

  /* Mobile bottom nav */
  .mobile-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
    z-index: 30;
  }
  .mobile-nav button {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 9px; font-weight: 600; color: var(--text-muted);
    padding: 4px 12px; transition: color .15s; background: none; border: none;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .mobile-nav button[data-active="true"] { color: var(--accent); }
  .more-popover {
    position: absolute; bottom: calc(100% + 8px); right: -12px;
    min-width: 200px; padding: 6px; z-index: 40; display: none;
  }

  /* Leaderboard row transitions + badge flash */
  .leaderboard-row { transition: background-color .3s ease; }
  .badge-flash { animation: badgeFlash .6s ease; }
  @keyframes badgeFlash {

    30%  { transform: scale(1.5); filter: brightness(1.5); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  /* Smooth momentum scrolling on every horizontal table wrapper */
  .scroll-x, .overflow-x-auto { -webkit-overflow-scrolling: touch; }

  @media (max-width: 640px) {
    .desktop-only { display:none !important; }
    .fab { bottom: 72px !important; }
    /* (bottom tab bar retired — no reserved space needed) */
    .search-bar { max-width: none; margin: 0 4px; }
    .notif-dropdown { width: 300px; right: -40px; }

    /* Modals: full-screen sheets on phones — edge to edge, no floating
       card, no double-scroll. Inline max-heights are overridden so the
       sheet owns the whole dynamic viewport. */
    .modal-overlay { padding: 0; }
    .modal-overlay > * {
      max-width: 100% !important;
      margin: 0 !important;
      border-radius: 0 !important;
      max-height: 100dvh !important;
    }

    /* Header: tighter so the icon cluster fits */
    .page-header { padding-left: 8px !important; padding-right: 8px !important; gap: 6px; }
    .icon-btn { width: 34px; height: 34px; }

    /* Spring Cleaning standings poster: keep the print layout intact and
       let the phone scroll it sideways */
    #spring-standings-poster { overflow-x: auto; }
    #spring-standings-poster > div { min-width: 760px; }

    /* Nav menu shouldn't overflow short screens */
    .nav-menu { max-height: calc(100vh - 90px); overflow-y: auto; }

    /* Native pickers: 16px stops iOS from zoom-jumping into the field.
       Must cover ALL controls — inputs created without a type attribute
       (most of the Sales Log form) never matched the old [type=…]
       selectors, so iOS kept zooming and the layout stuck "too big". */
    .modal-overlay input, .modal-overlay select, .modal-overlay textarea {
      font-size: 16px !important;
    }

    /* Wide tables: keep the REP column pinned while the metrics scroll —
       phone users lose track of whose row they're reading otherwise. */
    [data-section='rep-leaderboard'] table th:first-child,
    [data-section='rep-leaderboard'] table td:first-child {
      position: sticky; left: 0; z-index: 1;
      background: var(--card);
      box-shadow: 2px 0 0 var(--border);
    }
    [data-section='rep-leaderboard'] table thead th:first-child { z-index: 2; background: var(--card-2); }

    /* Wide tables never feel cut off: a soft right-edge fade signals there's
       more to swipe. (Static fade — cheap and universal.) */
    .scroll-x, .overflow-x-auto {
      -webkit-mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 22px), rgba(0,0,0,.25) 100%);
      mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 22px), rgba(0,0,0,.25) 100%);
    }

    /* NRLA standings: pin Seed + Team while the money columns swipe */
    .nrla-standings th, .nrla-standings td { white-space: nowrap; }

    /* NRLA hero on phones: the roster/ⓘ buttons + LAST SYNC stamp become one
       tidy row under the chips (sync left, buttons right) instead of a
       floating centered cluster. */
    .nrla-hero-side {
      flex-direction: row-reverse !important;
      align-items: center !important;
      justify-content: space-between !important;
      width: 100%;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.14);
    }
    .nrla-hero-side > div:last-child { margin-top: 0 !important; text-align: left !important; }
    .nrla-standings th:nth-child(1), .nrla-standings td:nth-child(1) {
      position: sticky; left: 0; z-index: 2; background: var(--card);
      width: 42px; min-width: 42px; max-width: 42px;

    .nrla-standings thead th:nth-child(1), .nrla-standings thead th:nth-child(2) { background: #0E1C30; z-index: 3; }
  }

  /* Momentum scrolling on every sideways-scrolling table (iOS) */
  .scroll-x, .overflow-x-auto { -webkit-overflow-scrolling: touch; }
  @media (min-width: 641px) {
    .mobile-only { display:none !important; }
    .mobile-nav { display: none !important; }
  }

  /* ═══════════ SLEEK PASS — crisper type, softer surfaces, calmer motion ═══════════ */
  :root { --ease-out: cubic-bezier(.22,.61,.36,1); }
  .card { border-radius: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 12px 32px -24px rgba(0,0,0,.28); }
  .card-2 { border-radius: 12px; }
  button {
    transition: background-color .15s var(--ease-out), color .15s var(--ease-out),
                border-color .15s var(--ease-out), box-shadow .15s var(--ease-out),
                transform .12s var(--ease-out), opacity .15s var(--ease-out), filter .15s var(--ease-out);
  }
  button:active { transform: scale(.97); }
  input, select, textarea { transition: border-color .15s var(--ease-out), box-shadow .15s var(--ease-out), background-color .15s var(--ease-out); }
  input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  /* Modals: frosted-glass overlay + gentle rise-in. */
  .modal-overlay { backdrop-filter: blur(14px) saturate(1.15); -webkit-backdrop-filter: blur(14px) saturate(1.15); animation: _ovlIn .16s var(--ease-out); }
  .modal-overlay > .card { border-radius: 18px; animation: _cardIn .22s var(--ease-out); }
  @keyframes _ovlIn { from { opacity: 0; } }
  @keyframes _cardIn { from { opacity: 0; transform: translateY(10px) scale(.985); } }
  @keyframes nrlaPulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
  /* Slim, quiet scrollbars. */
  * { scrollbar-width: thin; scrollbar-color: var(--border-2) transparent; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--text-subtle); }
  *::-webkit-scrollbar-track, *::-webkit-scrollbar-corner { background: transparent; }
  ::selection { background: color-mix(in srgb, var(--accent) 30%, transparent); }
  @media (prefers-reduced-motion: reduce) {
    .modal-overlay, .modal-overlay > .card { animation: none; }
    button { transition: none; }
    button:active { transform: none; }
  }

  /* ═══════════ MOBILE & TOUCH REFINEMENTS ═══════════ */
  html { -webkit-tap-highlight-color: transparent; }
  button, [draggable="true"] { touch-action: manipulation; }   /* no double-tap zoom delay */
  .overflow-x-auto, .overflow-auto, .overflow-y-auto { -webkit-overflow-scrolling: touch; }
  /* iOS zooms the whole page when focusing inputs under 16px — bump form
     text on touch devices only; desktop sizing untouched. */
  @media (pointer: coarse) {
    input[type="text"], input[type="date"], input[type="number"], input[type="email"],
    input[type="password"], input[type="search"], select, textarea { font-size: 16px; }
  }
  h1, h2 { text-wrap: balance; }
  /* NRLA playoff cards: double-width on desktop grids, but collapse to a
     normal single column on phones (a span-2 item in a 1-column auto-fill
     grid would overflow the screen). */
  .nrla-playoff { grid-column: span 2; }
  @media (max-width: 700px) { .nrla-playoff { grid-column: auto; } }

  /* ═══════════ MODERN VIBE v2 — layered canvas + frosted header ═══════════
     The old look was flat: white page, white cards, hard gray borders, solid
     black top bar. Now the canvas is a soft warm off-white, cards FLOAT on
     shadow with hairline borders, and the top bar is a frosted, translucent,
     theme-adaptive glass bar (iOS style). Peel-back: delete this block. */
  :root[data-theme="light"] {
    --bg:           #F3F3F1;
    --bg-subtle:    #ECECE9;
    --card-2:       #F7F7F4;
    --border:       rgba(17,17,17,.07);
    --border-2:     rgba(17,17,17,.16);
    --input-border: rgba(17,17,17,.16);
    --shadow-sm:    0 1px 2px rgba(17,17,17,.03);
    --shadow-lg:    0 24px 48px -16px rgba(17,17,17,.18);
  }
  :root[data-theme="dark"] {
    --bg:           #0A0A0C;
    --bg-subtle:    #101013;
    --card:         #17171A;
    --card-2:       #1D1D21;
    --border:       rgba(255,255,255,.08);
    --border-2:     rgba(255,255,255,.17);
    --input-bg:     #141417;
    --input-border: rgba(255,255,255,.17);
  }
  /* Cards float on the canvas instead of blending into it. */
  .card { box-shadow: 0 1px 2px rgba(17,17,17,.04), 0 16px 40px -28px rgba(17,17,17,.25); }
  /* Frosted, theme-adaptive top bar (was a solid black slab). */
  .page-header {

    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  @supports ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .page-header {
      background: color-mix(in srgb, var(--bg) 72%, transparent);
      backdrop-filter: blur(18px) saturate(1.5);
      -webkit-backdrop-filter: blur(18px) saturate(1.5);
    }
  }
  .page-header .icon-btn { background: color-mix(in srgb, var(--text) 7%, transparent); color: var(--text); }
  .page-header .icon-btn:hover { background: color-mix(in srgb, var(--text) 14%, transparent); }

  /* ── Static-Tailwind gap fills ─────────────────────────────────────────
     tailwind.css is PREBUILT; classes introduced after the last rebuild
     silently don't exist (this is how the desktop comp switcher rendered
     as an empty bar: `hidden sm:flex` with no sm:flex defined = hidden at
     every width). Fills below cover every responsive utility the markup
     uses that the prebuilt sheet lacks. If you rebuild tailwind.css, this
     block is harmlessly redundant. */
  @media (min-width: 640px) {
    .sm\:flex { display: flex; }
    .sm\:text-\[10px\] { font-size: 10px; }
    .sm\:w-\[280px\] { width: 280px; }
    .sm\:grid-cols-\[1fr_1fr_1\.3fr_\.7fr_auto\] { grid-template-columns: 1fr 1fr 1.3fr .7fr auto; }
    .sm\:grid-cols-\[auto_1fr\] { grid-template-columns: auto 1fr; }
    .sm\:grid-cols-\[auto_1fr_auto\] { grid-template-columns: auto 1fr auto; }
  }
  @media (min-width: 1024px) {
    .lg\:grid-cols-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    .lg\:grid-cols-\[3fr_7fr\] { grid-template-columns: 3fr 7fr; }
    .lg\:w-\[440px\] { width: 440px; }
  }
  .max-w-\[130px\] { max-width: 130px; }
  @media (min-width: 640px) { .sm\:w-\[240px\] { width: 240px; } }
  @media (min-width: 640px) { .sm\:items-start { align-items: flex-start; } .sm\:justify-between { justify-content: space-between; } .sm\:flex-initial { flex: 0 1 auto; } }

  /* ═══ APPLE-FEEL LAYER (Jul 2026) — motion, materials, touch ═══════════
     Everything animated sits inside prefers-reduced-motion so accessibility
     settings are honored, iOS style. */

  /* No tap flash on iOS. (overscroll-behavior-y:none was here briefly —
     with html+body both overflow-x:hidden it ate viewport wheel scrolling
     in Chrome entirely. Pull-to-refresh bounce is the lesser evil.) */
  * { -webkit-tap-highlight-color: transparent; }

  /* Frosted header — iOS nav-bar material. Solid fallback first.
     DARK mode: dark glass. LIGHT mode: light glass with dark content —
     a translucent BLACK bar over a white page just reads as mud. */
  .page-header {
    background: var(--header-bg);
    background: color-mix(in srgb, var(--header-bg) 82%, transparent);
    -webkit-backdrop-filter: blur(14px) saturate(1.5);
    backdrop-filter: blur(14px) saturate(1.5);
  }
  :root[data-theme="light"] .page-header {
    background: #FBFBFA;
    background: color-mix(in srgb, #FFFFFF 72%, transparent);
    color: var(--text);
    border-bottom: 1px solid rgba(0,0,0,.08);
    box-shadow: 0 1px 12px rgba(0,0,0,.04);
  }
  :root[data-theme="light"] .page-header .icon-btn { background: rgba(0,0,0,.05); color: var(--text); }
  :root[data-theme="light"] .page-header .icon-btn:hover { background: rgba(0,0,0,.10); }

  /* Subtle overlay scrollbars (macOS/iOS style). */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--text) 22%, transparent); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: color-mix(in srgb, var(--text) 35%, transparent); border-radius: 999px; }

  /* Calm, consistent focus ring — keyboard users only (focus-visible). */
  :focus-visible { outline: 2px solid color-mix(in srgb, var(--accent) 70%, transparent); outline-offset: 2px; border-radius: 6px; }

  @media (prefers-reduced-motion: no-preference) {
    /* Press feedback — everything tappable gives a little. */
    button:not(:disabled):active { transform: scale(.965); }
    button { transition: transform .12s cubic-bezier(.2,.8,.4,1); }

    /* Modals present like iOS sheets: dimmer fades, card springs up. */
    .modal-overlay { animation: riddFadeIn .18s ease-out; }
    .modal-overlay > * { animation: riddSheetUp .32s cubic-bezier(.32,.72,.28,1.06); }

    /* Dropdown panels pop from their anchor. */
    .card.absolute { animation: riddPop .16s cubic-bezier(.2,.8,.4,1); transform-origin: top; }

    /* Toasts spring in from the top like iOS banners. */
    #toasts > * { animation: riddToastIn .34s cubic-bezier(.34,1.25,.44,1); }

    /* View changes crossfade + rise — set by mountApp on navigation only,
       never on in-place re-renders. */
    .view-enter { animation: riddViewIn .22s ease-out; }
  }
  @keyframes riddFadeIn  { from { opacity: 0; } }
  @keyframes riddSheetUp { from { opacity: 0; transform: translateY(16px) scale(.98); } }
  @keyframes riddPop     { from { opacity: 0; transform: translateY(-4px) scale(.99); } }
  @keyframes riddToastIn { from { opacity: 0; transform: translateY(-10px) scale(.97); } }
  @keyframes riddViewIn  { from { opacity: 0; transform: translateY(6px); } }

</style>
