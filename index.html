      });
    }
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      filteredReps = filteredReps.filter(r => r.toLowerCase().includes(q));
    }

    const header = el('div', { class: 'flex items-center justify-between px-5 py-4 border-b', style: { borderColor: 'var(--border)' } },
      el('div', {},
        el('h2', { class: 'text-base font-bold' }, '👥 Manage Teams'),
        el('div', { class: 'text-xs text-muted- mt-0.5' },
          'Assign each rep to a team and tag as Rookie or Vet. Click a team to rename it, pick a color, or toggle ', el('strong', {}, 'Exclude from metrics'), ' — reps on excluded teams drop out of every rep-level view.'),
      ),
      el('button', {
        class: 'rounded-lg border px-3 py-1.5 text-xs',
        style: { borderColor: 'var(--border-2)' },
        onclick: () => overlay.remove(),
      }, 'Done'),
    );

    // ── Add team bar ──
    const newTeamInput = el('input', {
      type: 'text', placeholder: 'Add new team',
      class: 'flex-1 rounded-lg border px-3 py-1.5 text-sm',
      style: { borderColor: 'var(--border-2)' },
      onkeydown: (e) => { if (e.key === 'Enter') { commitNewTeam(); } },
    });
    const commitNewTeam = () => {
      const name = newTeamInput.value;
      if (!name.trim()) return;
      const ok = addTeam(name);
      if (!ok) { toast('Team already exists', 'warn'); return; }
      newTeamInput.value = '';
      render();
    };
    const addBar = el('div', { class: 'px-5 py-3 border-b flex items-center gap-2', style: { borderColor: 'var(--border)' } },
      newTeamInput,
      el('button', {
        class: 'rounded-lg px-3 py-1.5 text-xs font-bold',
        style: { background: 'var(--accent)', color: 'var(--accent-text)' },
        onclick: commitNewTeam,
      }, '+ Add'),
    );

    // ── Combined team chips ──
    // One row of chips serves as BOTH the rep-list filter and the entry into
    // a team's settings. Picking a real team activates the filter + opens an
    // inline detail panel below; picking "All" or "(unassigned)" only filters.
    const teamRepCount = (t) => reps.filter(r => getRepTeam(r) === t).length;
    const chipForTeam = (team, n) => {
      const isActive = teamSelect === team;
      // Excluded teams keep the red tint regardless of picked color so the
      // exclusion signal stays loud. Real teams use their team color so the
      // chip in the modal matches what shows up in the Indicators teams view.
      const baseStyle = isTeamExcluded(team)
        ? { background: 'rgba(220, 38, 38, .12)', color: '#DC2626', border: '1px solid transparent' }
        : team === '(unassigned)'
          ? { background: 'var(--card-2)', color: 'var(--text-muted)', border: '1px solid var(--border)' }
          : { background: getTeamColor(team), color: '#fff', border: '1px solid transparent' };
      const activeStyle = isActive ? { boxShadow: '0 0 0 2px var(--accent)', filter: 'brightness(1.05)' } : {};
      return el('button', {
        class: 'rounded-full px-2.5 py-0.5 text-[11px] font-semibold cursor-pointer transition hover:brightness-95',
        style: { ...baseStyle, ...activeStyle },
        onclick: () => {
          state._indicatorManageTeamFilter = isActive ? '' : team;
          render();
        },
      }, team + ' · ' + n);
    };
    const allActive = !teamSelect;
    // Build the chip list by union of (a) every team in distinctTeams so we
    // surface even teams with zero assigned reps, plus (b) the synthetic
    // "(unassigned)" pseudo-team if any rep lacks a team. counts already
    // covers (b); we merge teams from distinctTeams that are missing from it.
    const chipEntries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const chipNames = new Set(chipEntries.map(([t]) => t));
    teams.forEach(t => { if (!chipNames.has(t)) chipEntries.push([t, 0]); });
    const teamChips = el('div', { class: 'px-5 py-3 border-b flex flex-wrap gap-1.5 items-center', style: { borderColor: 'var(--border)' } },
      el('button', {
        class: 'rounded-full px-2.5 py-0.5 text-[11px] font-semibold cursor-pointer transition hover:brightness-95',
        style: allActive
          ? { background: 'var(--text)', color: 'var(--card)', boxShadow: '0 0 0 2px var(--accent)' }
          : { background: 'var(--card-2)', color: 'var(--text)', border: '1px solid var(--border-2)' },
        onclick: () => { state._indicatorManageTeamFilter = ''; render(); },
      }, 'All · ' + reps.length),
      ...chipEntries.map(([team, n]) => chipForTeam(team, n)),
      teamSelect && el('span', { class: 'text-[10px] text-muted- ml-1 italic' },
        'Showing ' + filteredReps.length + ' of ' + reps.length),
    );

    // ── Inline detail panel ──
    // Shown only when a real team is selected (not "All" or "(unassigned)").
    // Combines rename + exclude toggle + remove in one place.
    let detailPanel = null;
    if (teamSelect && teamSelect !== '(unassigned)') {
      const t = teamSelect;
      const excluded = isTeamExcluded(t);
      const repCount = teamRepCount(t);

      const renameInput = el('input', {
        type: 'text', value: t,
        class: 'flex-1 rounded-lg border px-3 py-1.5 text-sm font-semibold',
        style: { borderColor: 'var(--border-2)' },
        onkeydown: (e) => { if (e.key === 'Enter') commitRename(); },
      });
      const commitRename = () => {
        const next = renameInput.value;
        if (next == null) return;
        const result = renameTeam(t, next);
        if (!result.ok) { toast(result.error || 'Rename failed', 'warn'); return; }
        if (!result.noop) toast('Renamed to "' + next.trim() + '"', 'success');
        state._indicatorManageTeamFilter = next.trim();
        render();
      };

      const teamColor = getTeamColor(t);
      const hasCustomColor = !!(state._indicatorTeamColors && state._indicatorTeamColors[t]);

      detailPanel = el('div', { class: 'px-5 py-3 border-b flex flex-col gap-3', style: { borderColor: 'var(--border)', background: 'var(--card-2)' } },
        // Rename row
        el('div', { class: 'flex flex-col gap-1' },
          el('div', { class: 'text-[10px] uppercase tracking-widest font-semibold text-muted-' }, 'Team name'),
          el('div', { class: 'flex items-center gap-2' },
            renameInput,
            el('button', {
              class: 'rounded-lg px-3 py-1.5 text-xs font-bold',
              style: { background: 'var(--accent)', color: 'var(--accent-text)' },
              onclick: commitRename,
            }, 'Save'),
          ),
        ),
        // Color picker row
        el('div', { class: 'flex flex-col gap-1' },
          el('div', { class: 'text-[10px] uppercase tracking-widest font-semibold text-muted-' }, 'Color'),
          el('div', { class: 'flex items-center gap-2' },
            // Current-color swatch
            el('span', {
              class: 'inline-block rounded-full shrink-0',
              style: { width: '22px', height: '22px', background: teamColor, border: '1px solid var(--border-2)' },
              title: 'Current color: ' + teamColor + (hasCustomColor ? '' : ' (default)'),
            }),
            // Native color picker
            el('input', {
              type: 'color', value: teamColor,
              class: 'rounded-lg border cursor-pointer',
              style: { borderColor: 'var(--border-2)', width: '52px', height: '32px', padding: '2px' },
              oninput: (e) => { setTeamColor(t, e.target.value); render(); },
            }),
            // Quick-pick swatches from the default palette
            el('div', { class: 'flex flex-wrap gap-1' },
              ...TEAM_COLOR_PALETTE.map(hex => el('button', {
                class: 'rounded-full cursor-pointer hover:brightness-110 transition shrink-0',
                style: {
                  width: '18px', height: '18px', background: hex,
                  border: hex.toLowerCase() === teamColor.toLowerCase() ? '2px solid var(--text)' : '1px solid var(--border-2)',
                },
                title: hex,
                onclick: () => { setTeamColor(t, hex); render(); },
              })),
            ),
            hasCustomColor && el('button', {
              class: 'text-[10px] underline text-muted- cursor-pointer ml-auto',
              title: 'Reset to the auto-assigned default color',
              onclick: () => { setTeamColor(t, ''); render(); },
            }, 'Reset'),
          ),
        ),
        // Exclude toggle row
        el('div', { class: 'flex items-center justify-between rounded-lg p-2.5',
          style: {
            background: excluded ? 'rgba(220, 38, 38, .08)' : 'var(--card)',
            border: '1px solid ' + (excluded ? 'rgba(220, 38, 38, .35)' : 'var(--border-2)'),
          },
        },
          el('div', { class: 'flex flex-col' },
            el('div', { class: 'text-xs font-bold' }, 'Exclude from metrics'),
            el('div', { class: 'text-[10px] text-muted-' },
              excluded
                ? 'On — reps on this team are dropped from every rep-level view.'
                : 'Off — reps on this team count in all metrics.'),
          ),
          el('button', {
            class: 'rounded-full px-3 py-1 text-[11px] font-bold uppercase tracking-widest cursor-pointer transition',
            style: excluded
              ? { background: '#DC2626', color: '#fff' }
              : { background: 'var(--card)', color: 'var(--text-muted)', border: '1px solid var(--border-2)' },
            onclick: () => { setTeamExcluded(t, !excluded); render(); },
          }, excluded ? '● On' : '○ Off'),
        ),
        // Remove team row
        el('div', { class: 'flex justify-end' },
          el('button', {
            class: 'rounded-lg px-3 py-1.5 text-xs font-semibold cursor-pointer',
            style: { color: '#DC2626', border: '1px solid rgba(220, 38, 38, .35)', background: 'transparent' },
            onclick: () => {
              const msg = repCount > 0
                ? 'Remove team "' + t + '"? ' + repCount + ' rep' + (repCount === 1 ? '' : 's') + ' on it will be unassigned.'
                : 'Remove team "' + t + '"?';
              if (confirm(msg)) {
                removeTeam(t);
                state._indicatorManageTeamFilter = '';
                render();
              }
            },
          }, 'Remove team'),
        ),
      );
    }

    // Search box (id is stable across re-renders so we can refocus after a change)
    const searchInput = el('div', { class: 'px-5 py-3 border-b', style: { borderColor: 'var(--border)' } },
      el('input', {
        id: 'manage-reps-search',
        type: 'text', placeholder: 'Search rep…', value: search,
        class: 'w-full rounded-lg border px-3 py-1.5 text-sm',
        style: { borderColor: 'var(--border-2)' },
        oninput: (e) => { state._indicatorTeamSearch = e.target.value; render(); },
      }),
    );

    // Rep list (id is stable so we can preserve scroll position across re-renders)
    const repList = el('div', { id: 'manage-reps-list', class: 'flex-1 overflow-y-auto' },
      ...filteredReps.map(repName => {
        const currentTeam = getRepTeam(repName);
        const currentTier = getRepTier(repName);
        const teamExcluded = isTeamExcluded(currentTeam);
        const teamSel = el('select', {
          class: 'rounded-lg border px-2 py-1 text-xs cursor-pointer',
          style: {
            borderColor: 'var(--border-2)',
            background: teamExcluded ? 'rgba(220, 38, 38, .08)' : 'var(--card-2)',
            color: teamExcluded ? '#DC2626' : 'var(--text)',
          },
          onchange: (e) => {
            const v = e.target.value;
            if (v === '__new__') {
              const name = prompt('New team name:');
              if (name && name.trim()) {
                const clean = name.trim();
                addTeam(clean); // register so it persists even if no rep is on it
                setRepTeam(repName, clean);
              } else {
                setRepTeam(repName, currentTeam); // revert
              }
            } else {
              setRepTeam(repName, v);
            }
            render();
          },
        },
          el('option', { value: '', selected: !currentTeam }, '— Team —'),
          ...teams.map(t => el('option', { value: t, selected: currentTeam === t }, t)),
          el('option', { value: '__new__' }, '+ New team…'),
        );

        const tierMeta = repTierMeta(currentTier);
        const tierSel = el('select', {
          class: 'rounded-lg border px-2 py-1 text-xs cursor-pointer',
          style: {
            borderColor: 'var(--border-2)',
            background: tierMeta ? 'rgba(141,198,63,.08)' : 'var(--card-2)',
            color: tierMeta ? tierMeta.color : 'var(--text)',
            fontWeight: tierMeta ? '700' : '400',
          },
          onchange: (e) => { setRepTier(repName, e.target.value); render(); },
        },
          el('option', { value: '', selected: !currentTier }, '— Tier —'),
          ...REP_TIERS.map(t => el('option', { value: t.id, selected: currentTier === t.id }, t.label)),
        );

        const office = primaryOffice(repName);
        const active = isRepActive(repName);
        const activeToggle = el('button', {
          class: 'rounded-full px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest transition cursor-pointer',
          style: active
            ? { background: 'rgba(141,198,63,.18)', color: '#5F8A1F' }
            : { background: 'var(--card-2)', color: 'var(--text-muted)', border: '1px dashed var(--border-2)' },
          title: active ? 'Click to mark Inactive' : 'Click to mark Active',
          onclick: () => { setRepActive(repName, !active); render(); },
        }, active ? '● Active' : '○ Inactive');

        return el('div', { class: 'flex items-center justify-between gap-3 px-5 py-2 border-b text-sm', style: { borderColor: 'var(--border)', opacity: active ? '1' : '0.6' } },
          el('div', { class: 'flex items-center gap-2 min-w-0 flex-1' },
            el('span', { class: 'font-medium truncate' }, repName),
            office && el('span', {
              class: 'text-[10px] font-semibold rounded-full px-2 py-0.5 shrink-0',
              style: {
                background: 'var(--card)',
                color: BRANCH_COLORS[office.toUpperCase?.()] || 'var(--text-muted)',
                border: '1px solid var(--border)',
              },
              title: 'Primary office (read-only)',
            }, titleCase(office)),
            teamExcluded && el('span', { class: 'text-[10px] font-bold uppercase tracking-widest shrink-0', style: { color: '#DC2626' } }, '· hidden'),
          ),
          el('div', { class: 'flex items-center gap-2 shrink-0' },
            activeToggle,
            tierSel,
            teamSel,
          ),
        );
      }),
      filteredReps.length === 0 && el('div', { class: 'px-5 py-6 text-center text-sm text-muted- italic' },
        reps.length === 0 ? 'No reps found — upload a raw-sales CSV first.' : 'No reps match your search.'),
    );

    // Capture focus + scroll BEFORE we tear down the DOM so the user doesn't
    // lose their place every time they pick a tier/team or type in search.
    const prevList = document.getElementById('manage-reps-list');
    const prevScroll = prevList ? prevList.scrollTop : 0;
    const prevSearch = document.getElementById('manage-reps-search');
    const searchHadFocus = prevSearch && document.activeElement === prevSearch;
    const searchSelStart = searchHadFocus ? prevSearch.selectionStart : null;
    const searchSelEnd   = searchHadFocus ? prevSearch.selectionEnd   : null;

    card.innerHTML = '';
    card.append(header, addBar, teamChips, ...(detailPanel ? [detailPanel] : []), searchInput, repList);
    overlay.innerHTML = '';
    overlay.append(card);

    // Restore scroll + search focus on the freshly-rendered DOM
    requestAnimationFrame(() => {
      const newList = document.getElementById('manage-reps-list');
      if (newList) newList.scrollTop = prevScroll;
      if (searchHadFocus) {
        const newSearch = document.getElementById('manage-reps-search');
        if (newSearch) {
          newSearch.focus();
          if (searchSelStart != null) {
            try { newSearch.setSelectionRange(searchSelStart, searchSelEnd); } catch (_) {}
          }
        }
      }
    });
  };

  render();
  document.body.append(overlay);
}

function viewIndicators() {
  if (!state.indicatorsData) state.indicatorsData = null;
  if (!state.indicatorsView) state.indicatorsView = 'weekly';
  // Migration: legacy 'cumulative' becomes the new YTD-default 'range' mode
  if (state.indicatorsView === 'cumulative') state.indicatorsView = 'range';
  if (!state.indicatorsRangePreset) state.indicatorsRangePreset = 'ytd';
  if (state.indicatorsCustomStart == null) state.indicatorsCustomStart = '';
  if (state.indicatorsCustomEnd   == null) state.indicatorsCustomEnd   = '';
  if (state.indicatorsWeek == null) state.indicatorsWeek = -1; // -1 = latest
  if (!state.indicatorsGroupBy) state.indicatorsGroupBy = 'branch';

  // If no data uploaded yet, show upload UI
  if (!state.indicatorsData || !state.indicatorsData.length) {
    return el('div', { class: 'flex flex-col gap-5 max-w-6xl mx-auto' },
      el('h1', { class: 'text-2xl font-bold' }, 'Indicators'),
      el('div', { class: 'card p-10 text-center' },
        el('div', { class: 'text-4xl mb-3' }, '📊'),
        el('h2', { class: 'text-lg font-bold mb-2' }, 'Upload CSV to get started'),
        el('p', { class: 'text-sm text-muted- mb-4 max-w-md mx-auto' },
          'Upload the D2D Indicators CSV with columns: Week, Date, Branch, Sold Accounts, Weekly Sold Revenue, Avg. Initial, Auto Pay %, Appruv %, Multi-Years, Reps W/ a Sale'),
        csvUploadButton(),
      ),
    );
  }

  // Branch-vs-Teams aggregation. When grouping by Teams, we re-aggregate the
  // raw sales by team and reuse them everywhere `data`/`branches` are consumed
  // (table, charts, rankings). Teams mode requires raw sales — falls back
  // gracefully to Branch mode otherwise.
  const rawSalesAvailable = Array.isArray(state._indicatorRawSales) && state._indicatorRawSales.length > 0;
  const wantTeams = state.indicatorsGroupBy === 'teams';
  const groupBy = wantTeams && rawSalesAvailable ? 'teams' : 'branch';

  let allData;
  if (groupBy === 'teams') {
    allData = aggregateByTeam(state._indicatorRawSales, state.indicatorsData);
  } else if (rawSalesAvailable) {
    // Re-aggregate from raw sales (rather than using the pre-computed
    // state.indicatorsData) so that Excluded reps drop out of EVERY branch
    // metric — table, charts, ranking. Pre-aggregated CSVs without raw sales
    // can't apply the exclusion (no rep info per row), so they fall back.
    allData = aggregateByBranch(state._indicatorRawSales, state.indicatorsData);
  } else {
    allData = state.indicatorsData;
  }
  const allWeeks = [...new Set(allData.map(r => r.week))].sort((a, b) => a - b);
  const branches = [...new Set(allData.map(r => r.branch))].sort();
  const isRange = state.indicatorsView === 'range';

  // Range bounds (only used when view === 'range')
  const rangeBounds = indicatorRangeBounds(state.indicatorsRangePreset, {
    start: state.indicatorsCustomStart, end: state.indicatorsCustomEnd,
  });
  // For range mode, restrict the row pool to the selected window. Weekly mode
  // keeps the full data so the week selector still lists every week.
  const data = isRange
    ? allData.filter(r => isInIndicatorRange(r, rangeBounds))
    : allData;
  const weeks = isRange
    ? [...new Set(data.map(r => r.week))].sort((a, b) => a - b)
    : allWeeks;
  const currentWeek = state.indicatorsWeek === -1 ? allWeeks[allWeeks.length - 1] : state.indicatorsWeek;

  // Aggregate data
  const branchData = {};
  branches.forEach(b => {
    const rows = isRange
      ? data.filter(r => r.branch === b)
      : allData.filter(r => r.branch === b && r.week === currentWeek);
    if (!rows.length) { branchData[b] = null; return; }
    const sold = rows.reduce((a, r) => a + r.sold_accounts, 0);
    const rev  = rows.reduce((a, r) => a + r.revenue, 0);
    const multi= rows.reduce((a, r) => a + r.multi_years, 0);       // count of 18+24 month contracts
    const twelve = rows.reduce((a, r) => a + r.twelve_month, 0);    // count of 12 month contracts
    // Reps W/ A Sale = count of unique rep names for this branch.
    // Range: union across every week in window. Single-week: just that week.
    // Falls back to MAX of weekly counts if raw sales aren't available (pre-agg CSV).
    let reps;
    const raw = state._indicatorRawSales;
    if (Array.isArray(raw) && raw.length) {
      // Group key matching: branch view compares against s.office; team view
      // compares against the rep's team (the previous code only matched office,
      // which made every team's reps count = 0 → PRA always 0 in team mode).
      const groupKeyMatches = groupBy === 'teams'
        ? (s) => (getRepTeam(s.rep) || 'Unassigned') === b
        : (s) => s.office === b;
      const inWindow = (s) => {
        if (isRange) return weeks.includes(s.week) && groupKeyMatches(s);
        return groupKeyMatches(s) && s.week === currentWeek;
      };
      reps = new Set(raw.filter(inWindow).map(s => s.rep).filter(Boolean)).size;
    } else {
      reps = isRange ? Math.max(...rows.map(r => r.reps)) : rows[0]?.reps || 0;
    }
    // Avg Pest Initial — weight by the row's own non-Sentricon count (avg_initial_count).
    // Falls back to sold_accounts for pre-aggregated CSV rows that don't have it.
    const avgInitDen = rows.reduce((a, r) => a + (r.avg_initial_count != null ? r.avg_initial_count : r.sold_accounts), 0);
    const avgInit = avgInitDen > 0
      ? rows.reduce((a, r) => a + r.avg_initial * (r.avg_initial_count != null ? r.avg_initial_count : r.sold_accounts), 0) / avgInitDen
      : 0;
    const autoPay = rows.reduce((a, r) => a + r.auto_pay_pct * r.sold_accounts, 0) / (sold || 1);
    // Multi Year % = count(18+24 month) / count(12+18+24 month contracts)
    const contractTotal = twelve + multi;
    branchData[b] = {
      sold_accounts: sold,
      revenue: rev,
      avg_initial: avgInit,
      avg_initial_count: avgInitDen, // for proper RIDD-level weighting (excludes Sentricon)
      acv: sold > 0 ? rev / sold : 0,
      pra: reps > 0 ? rev / reps : 0,
      multi_year_pct: contractTotal > 0 ? multi / contractTotal : 0,
      auto_pay_pct: autoPay,
      reps: reps,
    };
  });

  // Compute RIDD totals
  const riddTotal = {};
  const activeBranches = branches.filter(b => branchData[b]);
  INDICATOR_METRICS.forEach(m => {
    if (m.key === 'avg_initial') {
      // Weighted by non-Sentricon account count; falls back to sold_accounts for pre-agg branches
      const weightOf = (b) => (branchData[b]?.avg_initial_count != null ? branchData[b].avg_initial_count : branchData[b]?.sold_accounts) || 0;
      const totalW = activeBranches.reduce((a, b) => a + weightOf(b), 0);
      riddTotal[m.key] = totalW > 0
        ? activeBranches.reduce((a, b) => a + (branchData[b]?.avg_initial || 0) * weightOf(b), 0) / totalW
        : 0;
    } else if (m.key === 'auto_pay_pct' || m.key === 'appruv_pct' || m.key === 'multi_year_pct') {
      const totalSold = activeBranches.reduce((a, b) => a + (branchData[b]?.sold_accounts || 0), 0);
      riddTotal[m.key] = totalSold > 0
        ? activeBranches.reduce((a, b) => a + (branchData[b]?.[m.key] || 0) * (branchData[b]?.sold_accounts || 0), 0) / totalSold
        : 0;
    } else if (m.key === 'acv') {
      const totalSold = activeBranches.reduce((a, b) => a + (branchData[b]?.sold_accounts || 0), 0);
      const totalRev = activeBranches.reduce((a, b) => a + (branchData[b]?.revenue || 0), 0);
      riddTotal[m.key] = totalSold > 0 ? totalRev / totalSold : 0;
    } else if (m.key === 'pra') {
      const totalRev = activeBranches.reduce((a, b) => a + (branchData[b]?.revenue || 0), 0);
      const totalReps = activeBranches.reduce((a, b) => a + (branchData[b]?.reps || 0), 0);
      riddTotal[m.key] = totalReps > 0 ? totalRev / totalReps : 0;
    } else {
      riddTotal[m.key] = activeBranches.reduce((a, b) => a + (branchData[b]?.[m.key] || 0), 0);
    }
  });

  // Compute per-metric rankings (rank 1 = best on that metric)
  const rankings = {};
  INDICATOR_METRICS.forEach(m => {
    const sorted = activeBranches
      .filter(b => branchData[b])
      .map(b => ({ branch: b, val: branchData[b][m.key] || 0 }))
      .sort((a, b) => b.val - a.val);
    rankings[m.key] = sorted.map((s, i) => ({ ...s, rank: i + 1, points: activeBranches.length - i }));
  });

  // Total Points = sum of per-metric ranks (golf scoring: lower = better).
  // Reps W/ A Sale is intentionally excluded — having more reps doesn't make
  // a branch/team a better seller, just a bigger one. The metric is still
  // ranked and shown in the matrix for context, but it doesn't contribute
  // points here.
  // Best-possible score = POWER_RANKING_METRICS.length (rank 1 on every metric).
  // Worst-possible = N × POWER_RANKING_METRICS.length.
  const POWER_RANKING_METRICS = INDICATOR_METRICS.filter(m => m.key !== 'reps');
  const worstRank = activeBranches.length;
  const totalPoints = {};
  activeBranches.forEach(b => {
    totalPoints[b] = POWER_RANKING_METRICS.reduce((sum, m) => {
      const entry = rankings[m.key]?.find(r => r.branch === b);
      return sum + (entry?.rank || worstRank);
    }, 0);
  });
  // Tie-breakers (best → worst):
  //   1. Lower Total Points (primary)
  //   2. Higher D2D Revenue
  //   3. Higher Avg Pest Initial
  const powerRankCompare = (a, b) => {
    const tp = (totalPoints[a] || 0) - (totalPoints[b] || 0);
    if (tp !== 0) return tp;
    const rev = (branchData[b]?.revenue || 0) - (branchData[a]?.revenue || 0);
    if (rev !== 0) return rev;
    return (branchData[b]?.avg_initial || 0) - (branchData[a]?.avg_initial || 0);
  };
  const powerRanking = activeBranches.slice().sort(powerRankCompare);

  // ── Previous-week comparison for the Power Ranking card ──
  // In weekly mode we re-run the same ranking pipeline on the prior week's
  // pre-aggregated rows. In range mode the concept doesn't apply (no single
  // "previous week"), so prevRankByBranch stays empty and the column is
  // suppressed in render.
  const prevRankByBranch = {};
  const prevPointsByBranch = {};
  let prevWeek = null;
  if (!isRange) {
    const idx = allWeeks.indexOf(currentWeek);
    if (idx > 0) prevWeek = allWeeks[idx - 1];
  }
  if (prevWeek != null) {
    const prevBranchData = {};
    // Iterate the FULL branch set, not just activeBranches — a group that had
    // data last week but no sales this week still mattered to last week's
    // ranking, and excluding it would shift every other group's prev rank by
    // one. We rank within whoever was present in the prior week, exactly as
    // the user would see if they navigated to that week directly.
    branches.forEach(b => {
      const row = allData.find(r => r.branch === b && r.week === prevWeek);
      if (!row) return;
      const sold = row.sold_accounts || 0;
      const rev = row.revenue || 0;
      const multi = row.multi_years || 0;
      const twelve = row.twelve_month || 0;
      const ctTotal = twelve + multi;
      prevBranchData[b] = {
        sold_accounts: sold,
        revenue: rev,
        avg_initial: row.avg_initial || 0,
        avg_initial_count: row.avg_initial_count != null ? row.avg_initial_count : sold,
        acv: sold > 0 ? rev / sold : 0,
        pra: row.reps > 0 ? rev / row.reps : 0,
        multi_year_pct: ctTotal > 0 ? multi / ctTotal : 0,
        auto_pay_pct: row.auto_pay_pct || 0,
        reps: row.reps || 0,
      };
    });
    const prevBranchesPresent = branches.filter(b => prevBranchData[b]);
    const prevWorstRank = prevBranchesPresent.length;
    const prevRankings = {};
    POWER_RANKING_METRICS.forEach(m => {
      const sorted = prevBranchesPresent
        .map(b => ({ branch: b, val: prevBranchData[b][m.key] || 0 }))
        .sort((a, b) => b.val - a.val);
      prevRankings[m.key] = sorted.map((s, i) => ({ ...s, rank: i + 1 }));
    });
    prevBranchesPresent.forEach(b => {
      prevPointsByBranch[b] = POWER_RANKING_METRICS.reduce((sum, m) => {
        const entry = prevRankings[m.key]?.find(r => r.branch === b);
        return sum + (entry?.rank || prevWorstRank);
      }, 0);
    });
    const prevSorted = prevBranchesPresent.slice().sort((a, b) => {
      const tp = (prevPointsByBranch[a] || 0) - (prevPointsByBranch[b] || 0);
      if (tp !== 0) return tp;
      const rev = (prevBranchData[b]?.revenue || 0) - (prevBranchData[a]?.revenue || 0);
      if (rev !== 0) return rev;
      return (prevBranchData[b]?.avg_initial || 0) - (prevBranchData[a]?.avg_initial || 0);
    });
    prevSorted.forEach((b, i) => { prevRankByBranch[b] = i + 1; });
  }

  // Date label for current week
  const weekRow = data.find(r => r.week === currentWeek);
  const dateLabel = weekRow?.date || '';

  return el('div', { class: 'flex flex-col gap-5 max-w-[1400px] mx-auto' },

    // ── Header row ──
    el('div', { class: 'flex items-center justify-between flex-wrap gap-3' },
      el('div', {},
        el('h1', { class: 'text-lg font-bold' }, (() => {
          if (!isRange) return 'D2D INDICATORS';
          const presetLabel = (INDICATOR_RANGE_PRESETS.find(p => p.id === state.indicatorsRangePreset) || {}).label || 'Range';
          if (state.indicatorsRangePreset === 'custom') {
            return `D2D INDICATORS — ${rangeBounds.start} to ${rangeBounds.end}`;
          }
          return `D2D INDICATORS — ${presetLabel}`;
        })()),
        !isRange && dateLabel && el('div', { class: 'text-xs text-muted-' }, dateLabel),
        isRange && el('div', { class: 'text-xs text-muted-' },
          rangeBounds.start + ' → ' + rangeBounds.end + ' · ' + weeks.length + ' week' + (weeks.length === 1 ? '' : 's')),
        state.indicatorsUploadedAt && el('div', { class: 'text-[11px] text-muted- mt-0.5' },
          'Last upload: ',
          el('span', { class: 'font-semibold', style: { color: 'var(--text)' } },
            new Date(state.indicatorsUploadedAt).toLocaleString('en-US', {
              month: 'short', day: 'numeric', year: 'numeric',
              hour: 'numeric', minute: '2-digit',
            })),
          state.indicatorsFileName ? ' · ' + state.indicatorsFileName : '',
        ),
      ),
      el('div', { class: 'flex items-center gap-2 flex-wrap' },
        // Branch / Teams group toggle
        el('div', { class: 'pill-tabs', title: rawSalesAvailable ? '' : 'Teams mode requires a raw-sales CSV upload' },
          el('button', {
            'data-active': groupBy === 'branch',
            onclick: () => { state.indicatorsGroupBy = 'branch'; saveDemoData(); mountApp(); },
          }, 'Branch'),
          el('button', {
            'data-active': groupBy === 'teams',
            disabled: !rawSalesAvailable,
            style: rawSalesAvailable ? {} : { opacity: '0.5', cursor: 'not-allowed' },
            onclick: () => {
              if (!rawSalesAvailable) {
                toast('Teams mode needs a raw-sales CSV (with Rep + Subscription columns)', 'warn');
                return;
              }
              state.indicatorsGroupBy = 'teams';
              saveDemoData();
              mountApp();
            },
          }, 'Teams'),
        ),
        // Weekly / Range toggle
        el('div', { class: 'pill-tabs' },
          el('button', { 'data-active': state.indicatorsView === 'weekly', onclick: () => { state.indicatorsView = 'weekly'; mountApp(); } }, 'Weekly'),
          el('button', { 'data-active': isRange,                            onclick: () => { state.indicatorsView = 'range';  mountApp(); } }, 'Range'),
        ),
        // Week selector (weekly view only)
        !isRange && el('select', {
          class: 'rounded-xl px-3 py-2 text-xs font-medium cursor-pointer',
          onchange: e => { state.indicatorsWeek = Number(e.target.value); mountApp(); },
        },
          ...allWeeks.map(w => {
            // Append the week's date range (e.g. "4/19-4/25") when available
            // so the dropdown reads "Week 16 · 4/19-4/25" instead of just "Week 16".
            const dateLabel = (allData.find(r => r.week === w)?.date || '').trim();
            return el('option', {
              value: w,
              selected: w === currentWeek,
            }, 'Week ' + w + (dateLabel ? ' · ' + dateLabel : ''));
          }),
        ),
        // Range preset (range view only)
        isRange && el('select', {
          class: 'rounded-xl px-3 py-2 text-xs font-medium cursor-pointer',
          onchange: e => { state.indicatorsRangePreset = e.target.value; mountApp(); },
        },
          ...INDICATOR_RANGE_PRESETS.map(p => el('option', {
            value: p.id, selected: state.indicatorsRangePreset === p.id,
          }, p.label)),
        ),
        // Custom date pickers (only when 'custom' is selected)
        isRange && state.indicatorsRangePreset === 'custom' && el('div', { class: 'flex items-center gap-1' },
          el('input', { type: 'date', class: 'rounded-xl border px-2 py-2 text-xs', value: state.indicatorsCustomStart || rangeBounds.start, onchange: e => { state.indicatorsCustomStart = e.target.value; mountApp(); } }),
          el('span', { class: 'text-muted- text-xs' }, '→'),
          el('input', { type: 'date', class: 'rounded-xl border px-2 py-2 text-xs', value: state.indicatorsCustomEnd   || rangeBounds.end,   onchange: e => { state.indicatorsCustomEnd   = e.target.value; mountApp(); } }),
        ),
        // Manage teams (rep assignments + tier + exclusion + colors)
        el('button', {
          class: 'rounded-xl px-3 py-2 text-xs font-semibold border transition hover:brightness-95',
          style: { borderColor: 'var(--border-2)', color: 'var(--text)' },
          onclick: () => openManageTeamsModal(),
          title: 'Manage teams — assign reps, pick a color, toggle Exclude from metrics',
        }, '👥 Manage Teams'),
        // Re-upload
        csvUploadButton('sm'),
      ),
    ),

    // ── Main metrics table (click metric name to sort branches) ──
    (() => {
      // Sort state: which metric is sorting the columns, and direction
      if (!state._indicatorSort) state._indicatorSort = { key: null, asc: false };
      const sort = state._indicatorSort;

      // Determine column order (branches sorted by the selected metric)
      let sortedBranches = [...branches];
      if (sort.key === '_points') {
        // Total Points lives outside branchData — sort by it directly. Lower = better (golf scoring).
        // Ties: higher D2D Revenue, then higher Avg Pest Initial.
        sortedBranches.sort((a, b) => {
          const cmp = powerRankCompare(a, b);
          return sort.asc ? cmp : -cmp;
        });
      } else if (sort.key) {
        sortedBranches.sort((a, b) => {
          const va = branchData[a]?.[sort.key] || 0;
          const vb = branchData[b]?.[sort.key] || 0;
          return sort.asc ? va - vb : vb - va;
        });
      }

      return el('div', { class: 'card overflow-hidden' },
        el('div', { class: 'scroll-x' },
          el('table', { class: 'w-full text-[12px]' },
            el('thead', {},
              el('tr', {},
                el('th', { class: 'text-left px-3 py-2 text-[10px] uppercase tracking-wider text-muted- font-semibold sticky left-0', style: { background: 'var(--card)', zIndex: 2 } },
                  groupBy === 'teams' ? 'Indicators · By Team' : 'Indicators · By Branch'),
                ...sortedBranches.map((b, i) => el('th', {
                  class: 'text-center px-3 py-2 text-[10px] uppercase tracking-wider font-bold text-white',
                  style: { background: getGroupColor(b), minWidth: '100px' },
                },
                  sort.key ? (i + 1) + '. ' : '',
                  b.split(' ').map(w => w[0] + w.slice(1).toLowerCase()).join(' '),
                )),
                el('th', { class: 'text-center px-3 py-2 text-[10px] uppercase tracking-wider font-bold', style: { background: '#1D1D1D', color: RIDD_COLOR, minWidth: '100px' } }, 'RIDD'),
              ),
            ),
            el('tbody', {},
              ...INDICATOR_METRICS.map(m => {
                const isSorting = sort.key === m.key;
                return el('tr', { class: 'border-t border-' + (isSorting ? ' font-bold' : '') },
                  el('td', {
                    class: 'px-3 py-2 font-semibold text-xs sticky left-0 cursor-pointer select-none hover:underline',
                    style: { background: 'var(--card)', zIndex: 1, color: isSorting ? 'var(--accent)' : '' },
                    onclick: () => {
                      if (sort.key === m.key) { sort.asc = !sort.asc; }
                      else { sort.key = m.key; sort.asc = false; }
                      mountApp();
                    },
                  },
                    indicatorMetricLabel(m),
                    isSorting ? (sort.asc ? ' ↑' : ' ↓') : '',
                  ),
                  ...sortedBranches.map(b => el('td', { class: 'px-3 py-2 text-center tabular-nums' },
                    branchData[b] ? m.fmt(branchData[b][m.key]) : '—',
                  )),
                  el('td', { class: 'px-3 py-2 text-center tabular-nums font-bold' }, m.fmt(riddTotal[m.key])),
                );
              }),
              // Power Rank row — shows each branch's overall rank (1 = best).
              // Underlying total points still drive the ranking and remain
              // visible on the Power Ranking card below.
              (() => {
                const rankByBranch = {};
                powerRanking.forEach((b, i) => { rankByBranch[b] = i + 1; });
                return el('tr', { class: 'border-t-2', style: { borderColor: 'var(--accent)' } },
                  el('td', {
                    class: 'px-3 py-2 font-bold text-xs sticky left-0 cursor-pointer select-none hover:underline',
                    style: { background: 'var(--card)', zIndex: 1, color: sort.key === '_points' ? 'var(--accent)' : '' },
                    onclick: () => {
                      if (sort.key === '_points') { sort.asc = !sort.asc; }
                      else { sort.key = '_points'; sort.asc = true; } // best (rank 1) shows first
                      mountApp();
                    },
                    title: 'Sorted by overall Power Ranking (lower rank = better)',
                  },
                    'Power Rank',
                    sort.key === '_points' ? (sort.asc ? ' ↑' : ' ↓') : '',
                  ),
                  ...sortedBranches.map(b => el('td', {
                    class: 'px-3 py-2 text-center tabular-nums font-black text-base',
                    style: rankByBranch[b] === 1 ? { color: 'var(--accent)' } : {},
                  }, '#' + (rankByBranch[b] || '—'))),
                  el('td', {}),
                );
              })(),
            ),
          ),
        ),
      );
    })(),

    // ── Rankings matrix + Power Ranking ──
    // Replaces the previous 6 separate ranking cards with a single compact
    // matrix: rows = groups (sorted by power rank), columns = each metric,
    // each cell shows the rank with #1 accented and bottom-third dimmed so
    // weak spots stand out. Power Ranking keeps its own card because it adds
    // total points + best/worst-metric callouts.
    (() => {
      // Mirrors the metrics that feed Power Ranking points so each row's rank
      // sum reconciles with the team's pts on the right-hand card. Reps is
      // intentionally omitted — it's still tracked elsewhere but rendering it
      // as a "rank" column read as confusing since reps doesn't measure
      // performance, just team size.
      const RANK_METRICS = ['sold_accounts', 'revenue', 'avg_initial', 'acv', 'pra', 'multi_year_pct', 'auto_pay_pct'];
      // Short metric labels so columns stay narrow. avg_initial flips between
      // "Initial" (branch view, no exclusions) and "Pest Initial" (team view).
      const SHORT_LABELS = {
        sold_accounts: 'Sold',
        revenue: 'Revenue',
        avg_initial: state.indicatorsGroupBy === 'teams' ? 'Pest Init' : 'Initial',
        acv: 'ACV', pra: 'PRA',
        multi_year_pct: 'MY %', auto_pay_pct: 'Auto Pay %',
        reps: 'Reps',
      };
      const bottomThirdCutoff = Math.floor((activeBranches.length || 1) * 2 / 3);

      // Best/worst metric per group for the Power Ranking card. Skip Reps
      // since it doesn't feed points; calling it a "best metric" would be
      // misleading (largest team isn't best, just biggest).
      const bestWorst = {};
      activeBranches.forEach(b => {
        let best = null, worst = null;
        POWER_RANKING_METRICS.forEach(m => {
          const entry = rankings[m.key]?.find(r => r.branch === b);
          if (!entry) return;
          if (!best  || entry.rank < best.rank)  best  = { metric: m, rank: entry.rank };
          if (!worst || entry.rank > worst.rank) worst = { metric: m, rank: entry.rank };
        });
        bestWorst[b] = { best, worst };
      });

      const matrixCard = el('div', { class: 'card overflow-hidden' },
        el('div', { class: 'px-4 py-2 border-b flex items-center justify-between', style: { borderColor: 'var(--border)' } },
          el('div', { class: 'text-[10px] uppercase tracking-widest text-muted- font-semibold' }, 'Rankings · by metric'),
          el('div', { class: 'text-[9px] uppercase tracking-widest text-muted-' }, '1 = best'),
        ),
        // Desktop / tablet: full table with horizontal scroll if needed.
        el('div', { class: 'hidden sm:block scroll-x' },
          el('table', { class: 'w-full text-[11px]' },
            el('thead', {},
              el('tr', { class: 'border-b', style: { borderColor: 'var(--border)' } },
                el('th', { class: 'text-left px-3 py-1.5 text-[10px] uppercase tracking-wider text-muted- font-semibold sticky left-0', style: { background: 'var(--card)' } }, groupBy === 'teams' ? 'Team' : 'Branch'),
                ...RANK_METRICS.map(key => el('th', {
                  class: 'text-center px-2 py-1.5 text-[10px] uppercase tracking-wider text-muted- font-semibold whitespace-nowrap',
                }, SHORT_LABELS[key] || key)),
              ),
            ),
            el('tbody', {},
              ...powerRanking.map(b => el('tr', { class: 'border-b', style: { borderColor: 'var(--border)' } },
                el('td', { class: 'px-3 py-1 font-semibold sticky left-0 truncate', style: { background: 'var(--card)', color: getGroupColor(b) } },
                  b.split(' ').map(w => w[0] + w.slice(1).toLowerCase()).join(' ')),
                ...RANK_METRICS.map(key => {
                  const entry = rankings[key]?.find(r => r.branch === b);
                  const rank = entry?.rank;
                  const isFirst = rank === 1;
                  const isBottomThird = rank && rank > bottomThirdCutoff;
                  const colorStyle = isFirst
                    ? { color: 'var(--accent)' }
                    : isBottomThird
                      ? { color: 'var(--text-subtle)' }
                      : {};
                  return el('td', {
                    class: 'px-2 py-1 text-center tabular-nums font-bold',
                    style: colorStyle,
                  }, rank ?? '—');
                }),
              )),
            ),
          ),
        ),
        // Mobile: stacked card per team. Avoids horizontal scrolling on
        // narrow screens; metric ranks render as a 4-column mini-grid inside
        // each team card so all 7 ranks fit at a glance.
        el('div', { class: 'sm:hidden p-3 flex flex-col gap-2' },
          ...powerRanking.map(b => {
            const teamColor = getGroupColor(b);
            return el('div', {
              class: 'rounded-lg border p-2.5',
              style: { borderColor: 'var(--border)', borderLeftWidth: '4px', borderLeftColor: teamColor },
            },
              el('div', { class: 'font-bold text-xs mb-2 truncate', style: { color: teamColor } },
                b.split(' ').map(w => w[0] + w.slice(1).toLowerCase()).join(' ')),
              el('div', { class: 'grid grid-cols-4 gap-x-3 gap-y-1 text-[10px]' },
                ...RANK_METRICS.map(key => {
                  const entry = rankings[key]?.find(r => r.branch === b);
                  const rank = entry?.rank;
                  const isFirst = rank === 1;
                  const isBottomThird = rank && rank > bottomThirdCutoff;
                  const valueColor = isFirst
                    ? 'var(--accent)'
                    : isBottomThird
                      ? 'var(--text-subtle)'
                      : 'var(--text)';
                  return el('div', { class: 'flex items-center justify-between gap-1' },
                    el('span', { class: 'text-muted-' }, SHORT_LABELS[key] || key),
                    el('span', { class: 'font-bold tabular-nums', style: { color: valueColor } }, rank ?? '—'),
                  );
                }),
              ),
            );
          }),
        ),
      );

      // Power Ranking card — table layout matching the by-metric matrix card
      // so the two cards read as a pair. Columns: #, Team/Branch, Pts, Best
      // Metric, Worst Metric. Best/Worst cells show metric label + value + rank
      // so the user sees both the relative position and the absolute number.
      const tooltipText = 'Golf scoring — lower is better. Sum of per-metric ranks across ' + POWER_RANKING_METRICS.length + ' performance metrics (Reps W/ A Sale is shown in the matrix but excluded from points). Best possible = ' + POWER_RANKING_METRICS.length + '.';
      const renderMetricCells = (kind, bw, b) => {
        const isBest = kind === 'best';
        const accentColor = isBest ? '#5F8A1F' : '#DC2626';
        if (!bw) {
          return [
            el('td', { class: 'px-2 py-1.5 text-right text-muted-' }, '—'),
            el('td', { class: 'px-2 py-1.5 text-muted-' }, '—'),
          ];
        }
        const key = bw.metric.key;
        const value = bw.metric.fmt(branchData[b]?.[key] ?? 0);
        const tooltip = (isBest ? 'Best metric — ' : 'Worst metric — ') + b + ' is rank #' + bw.rank + ' of ' + activeBranches.length + ' on ' + bw.metric.label;
        return [
          // Rank as its own column on the LEFT so the rank number leads the eye
          el('td', {
            class: 'px-2 py-1.5 text-right text-[11px] font-bold tabular-nums',
            style: { color: accentColor },
            title: tooltip,
          }, '#' + bw.rank),
          // Metric label + value
          el('td', { class: 'px-2 py-1.5 text-[10px]', title: tooltip },
            el('div', { class: 'inline-flex items-center gap-1.5 whitespace-nowrap', style: { color: accentColor } },
              el('span', { class: 'font-bold' }, SHORT_LABELS[key] || bw.metric.label),
              el('span', { class: 'tabular-nums' }, value),
            ),
          ),
        ];
      };

      const powerHeaderCell = (label, align) => el('th', {
        class: 'px-2 py-1.5 text-[10px] uppercase tracking-wider text-muted- font-semibold whitespace-nowrap ' + (align === 'right' ? 'text-right' : 'text-left'),
      }, label);

      const powerCard = el('div', { class: 'card overflow-hidden', style: { borderColor: 'var(--accent)', borderWidth: '2px' } },
        el('div', { class: 'px-4 py-2 border-b flex items-center justify-between', style: { borderColor: 'var(--accent)' } },
          el('div', { class: 'text-[10px] uppercase tracking-widest font-semibold', style: { color: 'var(--accent)' } }, 'Power Ranking'),
          el('div', { class: 'text-[9px] uppercase tracking-widest text-muted-' }, POWER_RANKING_METRICS.length + ' metrics scored · low pts win'),
        ),
        // Desktop / tablet: full table with horizontal scroll if needed.
        el('div', { class: 'hidden sm:block scroll-x' },
          el('table', { class: 'w-full text-[11px]' },
            el('thead', {},
              el('tr', { class: 'border-b', style: { borderColor: 'var(--border)' } },
                powerHeaderCell('#', 'left'),
                powerHeaderCell(groupBy === 'teams' ? 'Team' : 'Branch', 'left'),
                powerHeaderCell('Pts', 'right'),
                // Last-week columns only render in weekly mode (range mode
                // has no single "previous week" to compare against).
                prevWeek != null && powerHeaderCell('Last Pts', 'right'),
                prevWeek != null && powerHeaderCell('Δ', 'right'),
                powerHeaderCell('#', 'right'),
                powerHeaderCell('Best Metric', 'left'),
                powerHeaderCell('#', 'right'),
                powerHeaderCell('Worst Metric', 'left'),
              ),
            ),
            el('tbody', {},
              ...powerRanking.map((b, i) => {
                const bw = bestWorst[b] || {};
                const showWorst = bw.worst && bw.worst.metric.key !== bw.best?.metric.key;
                const currentRank = i + 1;
                const prevRank = prevRankByBranch[b];
                const prevPts = prevPointsByBranch[b];
                const delta = prevRank != null ? prevRank - currentRank : null;
                // Δ > 0 → improved (moved up the ranks). Δ < 0 → dropped.
                let lastPtsCell = null;
                let deltaCell = null;
                if (prevWeek != null) {
                  if (prevRank == null) {
                    lastPtsCell = el('td', {
                      class: 'px-2 py-1.5 text-right text-muted-',
                      title: b + ' had no data in the previous week',
                    }, '—');
                    deltaCell = el('td', {
                      class: 'px-2 py-1.5 text-right text-[10px] font-semibold',
                      style: { color: 'var(--text-muted)' },
                      title: b + ' had no data in the previous week',
                    }, 'NEW');
                  } else {
                    lastPtsCell = el('td', {
                      class: 'px-2 py-1.5 text-right tabular-nums',
                      style: { color: 'var(--text-muted)' },
                      title: b + ' had ' + prevPts + ' pts last week (rank #' + prevRank + ')',
                    }, prevPts);
                    if (delta > 0) {
                      deltaCell = el('td', {
                        class: 'px-2 py-1.5 text-right text-[11px] font-bold tabular-nums',
                        style: { color: '#5F8A1F' },
                        title: 'Moved up ' + delta + ' from #' + prevRank + ' last week',
                      }, '↑' + delta);
                    } else if (delta < 0) {
                      deltaCell = el('td', {
                        class: 'px-2 py-1.5 text-right text-[11px] font-bold tabular-nums',
                        style: { color: '#DC2626' },
                        title: 'Dropped ' + Math.abs(delta) + ' from #' + prevRank + ' last week',
                      }, '↓' + Math.abs(delta));
                    } else {
                      deltaCell = el('td', {
                        class: 'px-2 py-1.5 text-right text-[11px] font-bold',
                        style: { color: 'var(--text-muted)' },
                        title: 'Same rank as last week (#' + prevRank + ')',
                      }, '—');
                    }
                  }
                }
                return el('tr', { class: 'border-b', style: { borderColor: 'var(--border)' } },
                  el('td', { class: 'px-2 py-1.5 font-bold tabular-nums', style: { color: i === 0 ? 'var(--accent)' : 'var(--text-muted)' } }, currentRank),
                  el('td', { class: 'px-2 py-1.5 font-semibold', style: { color: getGroupColor(b) } },
                    b.split(' ').map(w => w[0] + w.slice(1).toLowerCase()).join(' ')),
                  el('td', { class: 'px-2 py-1.5 text-right tabular-nums font-semibold', title: tooltipText }, totalPoints[b]),
                  lastPtsCell,
                  deltaCell,
                  ...renderMetricCells('best', bw.best, b),
                  ...renderMetricCells('worst', showWorst ? bw.worst : null, b),
                );
              }),
            ),
          ),
        ),
        // Mobile: stacked card per team. Top line is rank + name + pts + Δ;
        // a quieter "last week" line carries the prev-week pts/rank, then
        // best/worst sit on their own lines so the metric label, value, and
        // rank fit without horizontal scroll.
        el('div', { class: 'sm:hidden p-3 flex flex-col gap-2' },
          ...powerRanking.map((b, i) => {
            const bw = bestWorst[b] || {};
            const showWorst = bw.worst && bw.worst.metric.key !== bw.best?.metric.key;
            const currentRank = i + 1;
            const teamColor = getGroupColor(b);
            const points = totalPoints[b] || 0;
            const prevRank = prevRankByBranch[b];
            const prevPts = prevPointsByBranch[b];
            const delta = prevRank != null ? prevRank - currentRank : null;
            // Δ pill for the top-right of the row
            let deltaPill = null;
            if (prevWeek != null) {
              if (prevRank == null) {
                deltaPill = el('span', { class: 'text-[10px] font-bold tabular-nums', style: { color: 'var(--text-muted)' } }, 'NEW');
              } else if (delta > 0) {
                deltaPill = el('span', { class: 'text-[11px] font-bold tabular-nums', style: { color: '#5F8A1F' } }, '↑' + delta);
              } else if (delta < 0) {
                deltaPill = el('span', { class: 'text-[11px] font-bold tabular-nums', style: { color: '#DC2626' } }, '↓' + Math.abs(delta));
              } else {
                deltaPill = el('span', { class: 'text-[11px] font-bold', style: { color: 'var(--text-muted)' } }, '—');
              }
            }
            const metricLine = (kind, m) => {
              if (!m) return null;
              const isBest = kind === 'best';
              const accentColor = isBest ? '#5F8A1F' : '#DC2626';
              const value = m.metric.fmt(branchData[b]?.[m.metric.key] ?? 0);
              return el('div', { class: 'flex items-center justify-between gap-2 text-[11px]', style: { color: accentColor } },
                el('div', { class: 'flex items-center gap-1.5 min-w-0' },
                  el('span', { class: 'font-bold shrink-0' }, '#' + m.rank),
                  el('span', { class: 'font-bold' }, SHORT_LABELS[m.metric.key] || m.metric.label),
                ),
                el('span', { class: 'tabular-nums shrink-0' }, value),
              );
            };
            return el('div', {
              class: 'rounded-lg border p-2.5 flex flex-col gap-1.5',
              style: { borderColor: 'var(--border)', borderLeftWidth: '4px', borderLeftColor: teamColor },
            },
              // Top row
              el('div', { class: 'flex items-center justify-between gap-2' },
                el('div', { class: 'flex items-center gap-2 min-w-0 flex-1' },
                  el('span', { class: 'font-bold tabular-nums shrink-0', style: { color: i === 0 ? 'var(--accent)' : 'var(--text-muted)' } }, '#' + currentRank),
                  el('span', { class: 'font-bold truncate', style: { color: teamColor } },
                    b.split(' ').map(w => w[0] + w.slice(1).toLowerCase()).join(' ')),
                ),
                el('div', { class: 'flex items-center gap-2 shrink-0' },
                  el('span', { class: 'text-sm font-bold tabular-nums' }, points + ' pts'),
                  deltaPill,
                ),
              ),
              // Last week line
              prevWeek != null && prevRank != null && el('div', { class: 'text-[10px] text-muted- tabular-nums' },
                'Last week: ' + prevPts + ' pts · #' + prevRank),
              // Best / worst metric lines
              metricLine('best', bw.best),
              showWorst && metricLine('worst', bw.worst),
            );
          }),
        ),
      );

      return el('div', { class: 'grid grid-cols-1 lg:grid-cols-2 gap-3' }, matrixCard, powerCard);
    })(),

    // ── Charts ──
    // Charts share the table's date filter when in Range mode, or use the full
    // YTD week list when in Weekly mode (so the full season trend is visible
    // even though the table is showing one week).
    el('div', { class: 'flex flex-col gap-4' },
      el('div', { class: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
        indicatorChart('Weekly PRA',     isRange ? data : allData, branches, 'pra',             isRange ? weeks : allWeeks),
        indicatorChart('Weekly Revenue', isRange ? data : allData, branches, 'revenue',         isRange ? weeks : allWeeks),
      ),
      el('div', {},
        indicatorChart('Branch Power Ranking', isRange ? data : allData, branches, '_power_ranking', isRange ? weeks : allWeeks, true),
      ),
    ),

    // ════════════════════════════════════════════════════════════════
    // REP-LEVEL ANALYTICS (computed from raw sales if available)
    // ════════════════════════════════════════════════════════════════
    ...indicatorRepSections(data, isRange, currentWeek),
  );
}

// ── Rep-level sections for Indicators tab ──
function indicatorRepSections(data, isRange, currentWeek) {
  // We need the raw sales data — stored alongside aggregated rows
  const allRawSales = state._indicatorRawSales;
  // Match the range filter the rest of the page uses. In Range mode we keep
  // only sales whose week falls inside the filtered indicator data; in Weekly
  // mode the leaderboard stays YTD (because the user may want comparison).
  const weeksInScope = isRange
    ? new Set(data.map(r => r.week))
    : null;
  // Excluded-team reps are dropped only when the user is viewing the page in
  // team mode. In branch mode (the default) every rep is included so the
  // numbers match the underlying CSV exactly. The scope picker on the trend
  // panel does its own per-scope filtering (team scope hides excluded reps;
  // branch and company scopes show everyone) regardless of this flag.
  const applyExclusion = state.indicatorsGroupBy === 'teams';
  const rawSales = (allRawSales || []).filter(s =>
    (!applyExclusion || !isRepExcluded(s.rep)) && (!weeksInScope || weeksInScope.has(s.week)));
  if (!allRawSales || !allRawSales.length) {
    // Always render a visible placeholder so admins know these tables exist
    // and what's needed to populate them.
    return [
      el('div', { class: 'card p-6 text-center', style: { borderStyle: 'dashed', borderColor: 'var(--border-2)' } },
        el('div', { class: 'text-2xl mb-2' }, '📋'),
        el('h3', { class: 'text-base font-bold mb-1' }, 'Rep-level analytics'),
        el('p', { class: 'text-xs text-muted- max-w-md mx-auto' },
          'Rep Leaderboard, Cancel Analysis, Attrition by Office, and Subscription Mix tables show up here when you upload a raw-sales CSV (one row per sale, with Rep + Subscription columns). The pre-aggregated CSV doesn\'t include rep names, so these stay hidden on that import.'),
      ),
    ];
  }

  const sections = [];

  // ── Compute rep stats ──
  const parseNum = (s) => parseFloat(String(s || '').replace(/[$,%]/g,'').replace(/,/g,'').trim()) || 0;
  const repMap = {};
  rawSales.forEach(s => {
    const rep = s.rep || 'Unknown';
    if (!repMap[rep]) repMap[rep] = { name: rep, office: s.office, sales: [], cancels: 0, revenue: 0, multi: 0, twelve: 0, autoPay: 0, aged: 0 };
    const r = repMap[rep];
    r.sales.push(s);
    r.revenue += s.contractValue;
    if (s.contract > 12) r.multi++;
    if (s.contract === 12) r.twelve++;
    if (s.autoPay && s.autoPay !== 'No') r.autoPay++;
    if ((s.cancelDate || s.active === 'No')) r.cancels++;
    if (s.age > 0) r.aged++;
  });
  // Decorate every rep with derived metrics so we can sort on any of them.
  // `avg_pest` here mirrors the chart's per-rep formula — Sentricon, German
  // Roach, and Interior Flea are excluded.
  const REP_AVG_PEST_EXCLUDE = /sentricon|german\s*roach|interior\s*flea/i;
  const allReps = Object.values(repMap).map(r => {
    const count = r.sales.length;
    // MY % = multi-year contracts (anything other than 12 months) / all contract sales (12 + multi)
    const ctTotal = r.twelve + r.multi;
    const eligibleForPest = r.sales.filter(s => !REP_AVG_PEST_EXCLUDE.test(s.subscription || ''));
    const avgPest = eligibleForPest.length > 0
      ? eligibleForPest.reduce((a, s) => a + (Number(s.initialPrice) || 0), 0) / eligibleForPest.length
      : 0;
    return {
      ...r,
      count,
      team: getRepTeam(r.name),
      tier: getRepTier(r.name), // 'rookie' | 'vet' | ''
      acv: count > 0 ? r.revenue / count : 0,
      avgPest,
      myPct: ctTotal > 0 ? r.multi / ctTotal : 0,
      autoPayPct: count > 0 ? r.autoPay / count : 0,
      cancelPct: count > 0 ? r.cancels / count : 0,
    };
  });

  // ── 1. REP PERFORMANCE TREND CHART (above the leaderboard) ──
  if (!state._indicatorRepChart) state._indicatorRepChart = { mode: 'top', metric: 'revenue', selected: [] };
  // Normalize legacy values (top_revenue / top_count → unified top; pra dropped)
  if (!state._indicatorRepChart.metric) state._indicatorRepChart.metric = 'revenue';
  if (state._indicatorRepChart.metric === 'pra') state._indicatorRepChart.metric = 'revenue';
  if (state._indicatorRepChart.mode === 'top_revenue') state._indicatorRepChart.mode = 'top';
  if (state._indicatorRepChart.mode === 'top_count')   state._indicatorRepChart.mode = 'top';
  if (!state._indicatorRepChart.mode)   state._indicatorRepChart.mode   = 'top';
  if (!Array.isArray(state._indicatorRepChart.selected)) state._indicatorRepChart.selected = [];
  const repChartCfg = state._indicatorRepChart;

  // Pick the reps that will be plotted. "Top 10" auto-uses whatever metric is
  // currently selected in the metric dropdown — Revenue, Sales, ACV, or Avg Pest Initial.
  let repsToChart = [];
  if (repChartCfg.mode === 'top') {
    // Selection rules per metric:
    //   - revenue / count: top 10 by that metric
    //   - avg_pest: top 10 by avgPest, but only reps with > 5 accounts so a
    //     single high-priced sale can't dominate
    //   - my_pct / acv: top 10 by REVENUE — these are percentage/average
    //     metrics where the absolute leaders aren't useful (a rep with one
    //     multi-year sale = 100% MY). Showing top revenue reps' MY%/ACV
    //     trend gives a meaningful comparison between actual top performers.
    const sortKeyForMetric = (metric) => {
      if (metric === 'my_pct' || metric === 'acv') return 'revenue';
      return ({ revenue: 'revenue', count: 'count', avg_pest: 'avgPest' })[metric] || 'revenue';
    };
    const effectiveSortKey = sortKeyForMetric(repChartCfg.metric);
    let pool = allReps.slice();
    if (repChartCfg.metric === 'avg_pest') pool = pool.filter(r => r.count > 5);
    repsToChart = pool.sort((a, b) => (b[effectiveSortKey] || 0) - (a[effectiveSortKey] || 0)).slice(0, 10).map(r => r.name);
  } else {
    // 'selected' — admin picks each rep manually
    repsToChart = repChartCfg.selected.filter(n => repMap[n]); // drop names that are no longer present
  }

  // Weeks shown on the chart x-axis (in scope of the date range)
  const chartWeeks = [...new Set(rawSales.map(s => s.week))].sort((a, b) => a - b);

  sections.push(repTrendChartCard({
    repsToChart,
    repMap,
    allReps,
    rawSales,
    chartWeeks,
    cfg: repChartCfg,
  }));

  // ── 2. REP LEADERBOARD ──
  if (!state._indicatorSelectedRep) state._indicatorSelectedRep = null;
  if (!state._indicatorRepSort) state._indicatorRepSort = { key: 'count', dir: 'desc' };
  if (state._indicatorRepOffice == null) state._indicatorRepOffice = '';
  if (state._indicatorRepTeamFilter == null) state._indicatorRepTeamFilter = '';
  if (state._indicatorRepTierFilter == null) state._indicatorRepTierFilter = '';

  // Define columns once so headers, sorting, and cell rendering stay in lockstep
  const repCols = [
    { key: 'name',       label: 'Rep',      align: 'left',  defaultDir: 'asc',  cell: r => {
        const meta = repTierMeta(r.tier);
        return el('td', { class: 'px-2 py-2' },
          el('div', { class: 'flex items-center gap-1.5' },
            el('span', { class: 'font-semibold' }, r.name),
            meta && el('span', {
              class: 'text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded',
              style: { background: meta.color + '22', color: meta.color },
            }, meta.label),
          ),
        );
      } },
    { key: 'team',       label: 'Team',     align: 'left',  defaultDir: 'asc',  cell: r => el('td', { class: 'px-2 py-2 text-muted-' }, r.team || '—') },
    { key: 'office',     label: 'Office',   align: 'left',  defaultDir: 'asc',  cell: r => el('td', { class: 'px-2 py-2 text-muted-' }, (r.office || '').split(' ').map(w => w[0]?.toUpperCase() + w.slice(1).toLowerCase()).join(' ')) },
    { key: 'count',      label: 'Sales',    align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'px-2 py-2 text-right tabular-nums' }, fmt.int(r.count)) },
    { key: 'revenue',    label: 'Revenue',  align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'px-2 py-2 text-right tabular-nums font-semibold' }, fmt.usd0(r.revenue)) },
    { key: 'acv',        label: 'ACV',      align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'px-2 py-2 text-right tabular-nums' }, fmt.usd(r.acv)) },
    { key: 'myPct',      label: 'MY %',     align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'px-2 py-2 text-right tabular-nums' }, (r.myPct * 100).toFixed(1) + '%') },
    { key: 'autoPayPct', label: 'Auto Pay', align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'px-2 py-2 text-right tabular-nums' }, (r.autoPayPct * 100).toFixed(1) + '%') },
    { key: 'cancels',    label: 'Cancels',  align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'px-2 py-2 text-right tabular-nums' }, r.cancels > 0 ? fmt.int(r.cancels) : '—') },
    { key: 'cancelPct',  label: 'Cancel %', align: 'right', defaultDir: 'desc', cell: r => el('td', { class: 'pl-2 pr-5 py-2 text-right tabular-nums', style: r.cancelPct > 0.1 ? { color: '#DC2626', fontWeight: '600' } : {} }, r.cancelPct > 0 ? (r.cancelPct * 100).toFixed(1) + '%' : '—') },
  ];

  // Apply office + team + tier filters
  const officeFilter = state._indicatorRepOffice;
  const teamFilter   = state._indicatorRepTeamFilter;
  const tierFilter   = state._indicatorRepTierFilter;
  const filteredReps = allReps.filter(r => {
    if (officeFilter && r.office !== officeFilter) return false;
    if (teamFilter) {
      if (teamFilter === '__unassigned__') { if (r.team) return false; }
      else if (r.team !== teamFilter) return false;
    }
    if (tierFilter) {
      if (tierFilter === '__unassigned__') { if (r.tier) return false; }
      else if (r.tier !== tierFilter) return false;
    }
    return true;
  });

  // Sort by the selected column
  const sortKey = state._indicatorRepSort.key;
  const sortDir = state._indicatorRepSort.dir;
  const cmpVal = (v) => typeof v === 'string' ? v.toLowerCase() : (v ?? 0);
  filteredReps.sort((a, b) => {
    const va = cmpVal(a[sortKey]);
    const vb = cmpVal(b[sortKey]);
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const offices = [...new Set(allReps.map(r => r.office).filter(Boolean))].sort();

  sections.push(
    el('div', { class: 'card overflow-hidden' },
      el('div', { class: 'px-5 py-3 border-b flex items-center justify-between flex-wrap gap-3', style: { borderColor: 'var(--border)' } },
        el('div', { class: 'flex items-center gap-3' },
          el('h3', { class: 'text-base font-bold' }, 'Rep Leaderboard'),
          el('span', { class: 'text-xs text-muted-' },
            filteredReps.length === allReps.length
              ? allReps.length + ' reps'
              : filteredReps.length + ' of ' + allReps.length + ' reps'),
        ),
        el('div', { class: 'flex items-center gap-2 flex-wrap' },
          // Tier quick-filter pills (replaces the previous dropdown)
          (() => {
            const hasUnassigned = allReps.some(r => !r.tier);
            const pillOpts = [
              { id: '',             label: 'All' },
              ...REP_TIERS.map(t => ({ id: t.id, label: t.label, color: t.color })),
            ];
            if (hasUnassigned) pillOpts.push({ id: '__unassigned__', label: 'Unassigned' });
            return el('div', { class: 'inline-flex rounded-lg border overflow-hidden', style: { borderColor: 'var(--border-2)' } },
              ...pillOpts.map(p => el('button', {
                class: 'px-2.5 py-1.5 text-[11px] font-semibold transition',
                style: tierFilter === p.id
                  ? { background: p.color || 'var(--accent)', color: '#fff' }
                  : { background: 'transparent', color: 'var(--text)' },
                onclick: () => { state._indicatorRepTierFilter = p.id; mountApp(); },
              }, p.label)),
            );
          })(),
          // Team filter
          (() => {
            const teams = distinctTeams().filter(t => !isTeamExcluded(t)); // excluded teams' reps already filtered out upstream
            const hasUnassigned = allReps.some(r => !r.team);
            return el('select', {
              class: 'rounded-lg border px-3 py-1.5 text-xs cursor-pointer',
              style: { borderColor: 'var(--border-2)' },
              onchange: (e) => { state._indicatorRepTeamFilter = e.target.value; mountApp(); },
            },
              el('option', { value: '', selected: !teamFilter }, 'All teams'),
              ...teams.map(t => el('option', { value: t, selected: teamFilter === t }, t)),
              hasUnassigned && el('option', { value: '__unassigned__', selected: teamFilter === '__unassigned__' }, '— Unassigned —'),
            );
          })(),
          // Office filter
          el('select', {
            class: 'rounded-lg border px-3 py-1.5 text-xs cursor-pointer',
            style: { borderColor: 'var(--border-2)' },
            onchange: (e) => { state._indicatorRepOffice = e.target.value; mountApp(); },
          },
            el('option', { value: '', selected: !officeFilter }, 'All offices'),
            ...offices.map(o => el('option', { value: o, selected: officeFilter === o },
              o.split(' ').map(w => w[0]?.toUpperCase() + w.slice(1).toLowerCase()).join(' '))),
          ),
        ),
      ),
      el('div', { class: 'scroll-x' },
        el('table', { class: 'w-full text-[12px]' },
          el('thead', { class: 'text-[9px] uppercase tracking-wider text-muted-' },
            el('tr', {},
              el('th', { class: 'text-left pl-5 pr-2 py-2 font-semibold w-8' }, '#'),
              ...repCols.map(c => {
                const isSorting = sortKey === c.key;
                const arrow = isSorting ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
                const align = c.align === 'right' ? 'text-right' : 'text-left';
                const padLeft = c.key === 'cancelPct' ? 'pl-2 pr-5' : 'px-2';
                return el('th', {
                  class: align + ' ' + padLeft + ' py-2 font-semibold cursor-pointer select-none hover:text-default transition',
                  style: isSorting ? { color: 'var(--accent)' } : {},
                  onclick: () => {
                    if (sortKey === c.key) {
                      state._indicatorRepSort = { key: c.key, dir: sortDir === 'asc' ? 'desc' : 'asc' };
                    } else {
                      state._indicatorRepSort = { key: c.key, dir: c.defaultDir };
                    }
                    mountApp();
                  },
                }, c.label + arrow);
              }),
            ),
          ),
          el('tbody', {},
            ...(filteredReps.length === 0
              ? [el('tr', {}, el('td', { class: 'px-5 py-6 text-center text-xs text-muted-', colspan: repCols.length + 1 }, 'No reps match the current filters.'))]
              : filteredReps.slice(0, 50).map((r, i) => {
                  const isSelected = state._indicatorSelectedRep === r.name;
                  return el('tr', {
                    class: 'border-t border- cursor-pointer transition',
                    style: isSelected ? { background: 'rgba(141,198,63,.1)' } : {},
                    onclick: () => { state._indicatorSelectedRep = isSelected ? null : r.name; mountApp(); },
                  },
                    el('td', { class: 'pl-5 pr-2 py-2 font-bold tabular-nums', style: i === 0 ? { color: 'var(--accent)' } : {} }, i + 1),
                    ...repCols.map(c => c.cell(r)),
                  );
                })),
          ),
        ),
      ),
    ),
  );

  // Keep the legacy `reps` reference alive for downstream sections that read it
  const reps = allReps.slice().sort((a, b) => b.sales.length - a.sales.length);

  // ── 2. SELECTED REP DETAIL ──
  if (state._indicatorSelectedRep) {
    const r = repMap[state._indicatorSelectedRep];
    if (r) {
      const count = r.sales.length;
      const acv = count > 0 ? r.revenue / count : 0;
      const ctTotal = r.twelve + r.multi;
      // MY % = multi-year contracts / all contract sales (matches Rep Leaderboard column)
      const myPct = ctTotal > 0 ? r.multi / ctTotal : 0;
      const autoPayPct = count > 0 ? r.autoPay / count : 0;
      // Top subscriptions
      const subCounts = {};
      r.sales.forEach(s => { subCounts[s.subscription] = (subCounts[s.subscription] || 0) + 1; });
      const topSubs = Object.entries(subCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      // Top sources
      const srcCounts = {};
      r.sales.forEach(s => { srcCounts[s.source] = (srcCounts[s.source] || 0) + 1; });
      const topSrcs = Object.entries(srcCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      // Cancels
      const repCancels = r.sales.filter(s => s.cancelDate || s.active === 'No');

      sections.push(
        el('div', { class: 'card p-5' },
          el('div', { class: 'flex items-center justify-between mb-4' },
            el('h3', { class: 'text-lg font-bold' }, '📋 ' + r.name),
            el('button', { class: 'text-xs text-muted- hover:text-default', onclick: () => { state._indicatorSelectedRep = null; mountApp(); } }, '✕ Close'),
          ),
          // Stat grid
          el('div', { class: 'grid grid-cols-3 sm:grid-cols-6 gap-3 mb-5' },
            ...([
              ['Sales', fmt.int(count)],
              ['Revenue', fmt.usd0(r.revenue)],
              ['ACV', fmt.usd(acv)],
              ['MY %', (myPct * 100).toFixed(1) + '%'],
              ['Auto Pay', (autoPayPct * 100).toFixed(1) + '%'],
              ['Cancels', fmt.int(r.cancels)],
            ].map(([label, value]) => el('div', { class: 'card-2 rounded-lg border border- p-3 text-center' },
              el('div', { class: 'text-[9px] uppercase tracking-widest text-muted- font-semibold' }, label),
              el('div', { class: 'text-lg font-bold tabular-nums mt-1' }, value),
            ))),
          ),
          // Two columns: top subscriptions + top sources
          el('div', { class: 'grid grid-cols-1 sm:grid-cols-2 gap-4' },
            el('div', {},
              el('h4', { class: 'text-xs font-bold uppercase tracking-widest text-muted- mb-2' }, 'Top Subscriptions'),
              el('div', { class: 'flex flex-col gap-1' },
                ...topSubs.map(([name, cnt]) => el('div', { class: 'flex items-center justify-between text-xs py-1 border-b border-' },
                  el('span', {}, name),
                  el('span', { class: 'font-semibold tabular-nums' }, cnt),
                )),
              ),
            ),
            el('div', {},
              el('h4', { class: 'text-xs font-bold uppercase tracking-widest text-muted- mb-2' }, 'Top Sources'),
              el('div', { class: 'flex flex-col gap-1' },
                ...topSrcs.map(([name, cnt]) => el('div', { class: 'flex items-center justify-between text-xs py-1 border-b border-' },
                  el('span', {}, name || 'Unknown'),
                  el('span', { class: 'font-semibold tabular-nums' }, cnt),
                )),
              ),
            ),
          ),
          // Cancel list for this rep
          repCancels.length > 0 && el('div', { class: 'mt-4' },
            el('h4', { class: 'text-xs font-bold uppercase tracking-widest text-muted- mb-2' }, 'Cancelled Accounts (' + repCancels.length + ')'),
            el('div', { class: 'flex flex-col gap-1' },
              ...repCancels.map(s => el('div', { class: 'flex items-center justify-between text-xs py-1 border-b border-' },
                el('span', {}, s.customer || '—'),
                el('div', { class: 'flex items-center gap-3' },
                  el('span', { class: 'text-muted-' }, s.subscription || ''),
                  el('span', { class: 'text-muted-' }, s.cancelReason || 'No reason'),
                ),
              )),
            ),
          ),
        ),
      );
    }
  }

  // ── 3. CANCEL ANALYSIS ──
  const allCancels = rawSales.filter(s => s.cancelDate || s.active === 'No');
  if (allCancels.length > 0 || rawSales.length > 0) {
    // By reason
    const reasonCounts = {};
    allCancels.forEach(s => {
      const reason = (s.cancelReason || 'Unspecified').trim();
      reasonCounts[reason] = (reasonCounts[reason] || 0) + 1;
    });
    const topReasons = Object.entries(reasonCounts).sort((a, b) => b[1] - a[1]);

    // By package (cancel rate per subscription)
    const subStats = {};
    rawSales.forEach(s => {
      const sub = s.subscription || 'Unknown';
      if (!subStats[sub]) subStats[sub] = { total: 0, cancels: 0 };
      subStats[sub].total++;
      if (s.cancelDate || s.active === 'No') subStats[sub].cancels++;
    });
    const subCancelRates = Object.entries(subStats)
      .filter(([_, v]) => v.total >= 5) // min 5 sales to show
      .map(([name, v]) => ({ name, ...v, rate: v.cancels / v.total }))
      .sort((a, b) => b.rate - a.rate);

    sections.push(
      el('div', { class: 'card p-5' },
        el('h3', { class: 'text-base font-bold mb-4' }, '🚫 Cancel Analysis'),
        el('div', { class: 'grid grid-cols-1 sm:grid-cols-2 gap-5' },
          // By reason — click a row to drill into the customers behind it
          el('div', {},
            el('h4', { class: 'text-xs font-bold uppercase tracking-widest text-muted- mb-2' }, 'By Reason (' + allCancels.length + ' total · click to drill in)'),
            el('div', { class: 'flex flex-col gap-1' },
              ...topReasons.map(([reason, cnt]) => {
                const isSelected = state._indicatorSelectedReason === reason;
                return el('div', {
                  class: 'flex items-center justify-between text-xs py-1.5 border-b border- cursor-pointer transition rounded',
                  style: isSelected
                    ? { background: 'rgba(141,198,63,.12)', paddingLeft: '8px', paddingRight: '8px', borderBottomColor: 'transparent' }
                    : { paddingLeft: '8px', paddingRight: '8px' },
                  onclick: () => {
                    state._indicatorSelectedReason = isSelected ? null : reason;
                    mountApp();
                  },
                },
                  el('span', { class: 'flex items-center gap-1.5' },
